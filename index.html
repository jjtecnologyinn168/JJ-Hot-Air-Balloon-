<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>16:9 Landscape (1920x1080)</title>
    <style>
        body { margin: 0; background: #050b14; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Arial Black', Impact, sans-serif; }
        .canvas { width: 1920px; height: 1080px; background: radial-gradient(circle, #111e36 0%, #050b14 100%); position: relative; box-sizing: border-box; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        .gold-67 { position: absolute; right: 350px; top: 50%; transform: translateY(-50%); font-size: 380px; color: #fff; text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd700, 0 0 120px #ff8c00, 0 0 200px #ff4500; }
        .snake-body { position: absolute; left: -100px; top: 600px; width: 800px; height: 120px; background: linear-gradient(90deg, #00ff88, #00eeff); border-radius: 60px; box-shadow: 0 0 60px #00ff88; transform: rotate(-15deg); }
        .snake-head { position: absolute; left: 650px; top: 400px; width: 160px; height: 160px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 70px #00ff88; }
        .eye { width: 35px; height: 35px; background: white; border-radius: 50%; position: absolute; top: 40px; right: 30px; }
        .eye::after { content: ''; width: 18px; height: 18px; background: black; border-radius: 50%; position: absolute; top: 8px; right: 8px; }
        .title { position: absolute; left: 100px; top: 100px; font-size: 110px; color: #00ffcc; text-shadow: 0 0 30px #00ffcc; letter-spacing: 5px; }
    </style>
</head>
<body>
    <div class="canvas">
        <div class="title">MAGIC SNAKE</div>
        <div class="snake-body"></div>
        <div class="snake-head"><div class="eye"></div></div>
        <div class="gold-67">67</div>
    </div>
</body>
</html>
