<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> JJ Hot Air Balloon </title>
    <style>
        /* ==========================================================================
           ULTRA-HIGH DEFINITION GRAPHICS SHADER COMPONENT
           ========================================================================== */
        :root {
            --bg-base: #010206;
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff00ff;
            --neon-gold: #ffd700;
            --neon-bomb: #ff2200;
            --pure-white: #ffffff;
            --font-stack: 'Consolas', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
            font-family: var(--font-stack);
            color: var(--pure-white);
        }

        #engine-viewport-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        /* REMOVED ALL THE OLD CRT TV BLACK SCANLINES - PURE HIGH-RES RETINA OUTPUT */
        canvas {
            display: block;
            background-color: #010103;
            border: 2px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 60px rgba(0, 242, 254, 0.25);
        }

        /* Professional Heads-Up Display */
        #hud-master-panel {
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            pointer-events: none;
        }

        .hud-cluster {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .hud-card {
            background: rgba(1, 2, 6, 0.9);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-left: 5px solid var(--neon-cyan);
            padding: 10px 20px;
            min-width: 160px;
        }

        .hud-title {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
        }

        .hud-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .speed-dock {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .speed-trigger {
            background: rgba(4, 8, 28, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.4);
            color: var(--neon-cyan);
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            font-family: var(--font-stack);
            transition: all 0.2s ease;
        }

        .speed-trigger.active {
            background: var(--neon-cyan);
            color: #000000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Main Single Interactive Mask Overlay */
        #menu-gate-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 2, 4, 0.97);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #start-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 22px 70px;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 8px;
            font-family: var(--font-stack);
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.25);
            transition: all 0.2s ease;
        }

        #start-btn:hover {
            background: var(--neon-cyan);
            color: #000000;
            box-shadow: 0 0 50px var(--neon-cyan);
        }

        /* Seizure Screen Twitch Shader Animation Matrix */
        body.glitch-twitch-active #engine-viewport-container {
            animation: hardwareExtremeTwitch 0.05s infinite alternate linear;
        }

        @keyframes hardwareExtremeTwitch {
            0% { transform: translate(4px, -3px) skewX(2deg); background-color: #ff0055; }
            50% { transform: translate(-3px, 4px) skewX(-2deg); background-color: #00ffaa; }
            100% { transform: translate(2px, 2px) skewX(0deg); background-color: #9900ff; }
        }
    </style>
</head>
<body>

    <div id="engine-viewport-container">
        
        <div id="hud-master-panel">
            <div class="hud-cluster">
                <div class="hud-card">
                    <div class="hud-title">SCORE MATRIX</div>
                    <div class="hud-value" id="live-score-node">000000</div>
                </div>
                <div class="hud-card" style="border-left-color: var(--neon-gold)">
                    <div class="hud-title">HI-SCORE RECORD</div>
                    <div class="hud-value" id="live-high-node" style="color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold);">000000</div>
                </div>
            </div>

            <div class="hud-cluster" style="align-items: flex-end;">
                <div class="hud-card" style="border-left-color: var(--neon-magenta)">
                    <div class="hud-title">CHRONO PHASE</div>
                    <div class="hud-value" id="live-phase-node" style="color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); font-size: 1.2rem;">DAYTIME</div>
                </div>
                <div class="speed-dock">
                    <button class="speed-trigger" id="rate-low">LOW</button>
                    <button class="speed-trigger active" id="rate-med">MED</button>
                    <button class="speed-trigger" id="rate-high">HIGH</button>
                </div>
            </div>
        </div>

        <canvas id="mainGameCanvas" width="768" height="1024"></canvas>

        <div id="menu-gate-mask">
            <button id="start-btn">START GAME</button>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            const SYSTEM_SETTING = {
                CANVAS_W: 768,
                CANVAS_H: 1024,
                SNAKE_LERP_X: 0.14, // Fluid high-sensitivity snake drag coefficient
                SNAKE_LERP_Y: 0.10,
                MAX_VELOCITY: 22.0,
                SCROLL_SPEED_BASE: 6.0,
                ENVIRONMENT_DURATION: 900,
                
                VELOCITY_MODES: { LOW: 0.65, MED: 1.00, HIGH: 1.70 },
                LIMITS: { ITEMS: 40, BOMBS: 12, METEORS: 15, CHROMES: 3, SPARKS: 400 }
            };

            const STATE_CORE = {
                ctx: null,
                running: false,
                over: false,
                ticks: 0,
                score: 0,
                highScore: parseInt(localStorage.getItem('cyber_v6_high') || '0'),
                
                speedMultiplier: 1.00,
                envPhase: "DAYTIME", // DAYTIME -> TWILIGHT -> NIGHTFALL
                phaseCounter: 0,
                
                // Object Pool Array Structs
                balloon: null,
                coins: [],
                bombs: [],
                meteors: [],
                chromes67: [],
                rainbowBombs: [],
                particles: [],
                floats: [],
                
                // Pure Vector Swipe Tracking Registers
                swipe: { startX: 0, startY: 0, deltaX: 0, deltaY: 0, active: false },
                
                twitchFramesRemaining: 0,
                audioCtx: null
            };

            const UI_DOM = {
                mask: document.getElementById('menu-gate-mask'),
                btn: document.getElementById('start-btn'),
                hud: document.getElementById('hud-master-panel'),
                score: document.getElementById('live-score-node'),
                high: document.getElementById('live-high-node'),
                phase: document.getElementById('live-phase-node'),
                canvas: document.getElementById('mainGameCanvas'),
                rLow: document.getElementById('rate-low'),
                rMed: document.getElementById('rate-med'),
                rHigh: document.getElementById('rate-high')
            };

            // Bootstrap Setup Links
            window.addEventListener('DOMContentLoaded', () => {
                STATE_CORE.ctx = UI_DOM.canvas.getContext('2d');
                UI_DOM.high.textContent = formatScore(STATE_CORE.highScore);
                
                resizeEngineViewport();
                UI_DOM.btn.addEventListener('click', bootUpPipelineEngine);
                window.addEventListener('resize', resizeEngineViewport);
                
                UI_DOM.rLow.addEventListener('click', (e) => adjustSpeedGate('LOW', e.currentTarget));
                UI_DOM.rMed.addEventListener('click', (e) => adjustSpeedGate('MED', e.currentTarget));
                UI_DOM.rHigh.addEventListener('click', (e) => adjustSpeedGate('HIGH', e.currentTarget));
                
                executePassiveRenderClear();
            });

            function resizeEngineViewport() {
                const targetRatio = SYSTEM_SETTING.CANVAS_W / SYSTEM_SETTING.CANVAS_H;
                let w = window.innerWidth, h = window.innerHeight;
                if (w / h > targetRatio) w = h * targetRatio; else h = w / targetRatio;
                UI_DOM.canvas.style.width = `${w}px`; UI_DOM.canvas.style.height = `${h}px`;
            }

            function adjustSpeedGate(mode, domNode) {
                document.querySelectorAll('.speed-trigger').forEach(n => n.classList.remove('active'));
                if (domNode) domNode.classList.add('active');
                STATE_CORE.speedMultiplier = SYSTEM_SETTING.VELOCITY_MODES[mode];
                triggerAudioBeep('click');
            }

            function formatScore(n) { return String(n).padStart(6, '0'); }

            function unlockAudioHardware() {
                if (!STATE_CORE.audioCtx) STATE_CORE.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (STATE_CORE.audioCtx.state === 'suspended') STATE_CORE.audioCtx.resume();
            }

            function triggerAudioBeep(profile) {
                if (!STATE_CORE.audioCtx) return;
                const c = STATE_CORE.audioCtx; const now = c.currentTime;
                const osc = c.createOscillator(); const gain = c.createGain();
                
                if (profile === 'coin') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(659.25, now); osc.frequency.setValueAtTime(1318.51, now + 0.05);
                    gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                } else if (profile === 'twitch') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, now); osc.frequency.linearRampToValueAtTime(40, now + 0.6);
                    gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.65);
                } else if (profile === 'click') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now);
                    gain.gain.setValueAtTime(0.04, now); gain.gain.linearRampToValueAtTime(0.001, now + 0.05);
                } else { // blast
                    osc.type = 'square'; osc.frequency.setValueAtTime(100, now); osc.frequency.linearRampToValueAtTime(10, now + 0.8);
                    gain.gain.setValueAtTime(0.4, now); gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                }
                osc.connect(gain); gain.connect(c.destination); osc.start(now); osc.stop(now + 0.85);
            }

            // ==========================================================================
            // TRUE HIGH-GLOSS SPECULAR MULTILAYER BALOON ACTOR ENGINE WITH FLAME PROPULSION
            // ==========================================================================
            class UltraRealisticHotAirBalloon {
                constructor() {
                    this.x = SYSTEM_SETTING.CANVAS_W / 2;
                    this.y = SYSTEM_SETTING.CANVAS_H * 0.75;
                    this.r = 28;
                    this.vx = 0; this.vy = 0;
                }

                update() {
                    // Fluent drag position calculation matrices
                    let tx = STATE_CORE.swipe.active ? STATE_CORE.swipe.deltaX * 0.30 : 0;
                    let ty = STATE_CORE.swipe.active ? STATE_CORE.swipe.deltaY * 0.30 : 0;

                    if (tx > SYSTEM_SETTING.MAX_VELOCITY) tx = SYSTEM_SETTING.MAX_VELOCITY;
                    if (tx < -SYSTEM_SETTING.MAX_VELOCITY) tx = -SYSTEM_SETTING.MAX_VELOCITY;
                    if (ty > SYSTEM_SETTING.MAX_VELOCITY) ty = SYSTEM_SETTING.MAX_VELOCITY;
                    if (ty < -SYSTEM_SETTING.MAX_VELOCITY) ty = -SYSTEM_SETTING.MAX_VELOCITY;

                    // Interpolate Fluid Motion Vector Calculations (True Snake Response)
                    this.vx += (tx - this.vx) * SYSTEM_SETTING.SNAKE_LERP_X;
                    this.vy += (ty - this.vy) * SYSTEM_SETTING.SNAKE_LERP_Y;
                    this.x += this.vx * STATE_CORE.speedMultiplier;
                    this.y += this.vy * STATE_CORE.speedMultiplier;

                    // Enforce Hardware Viewport Lock Barriers
                    if (this.x - this.r < 0) { this.x = this.r; this.vx = 0; }
                    if (this.x + this.r > SYSTEM_SETTING.CANVAS_W) { this.x = SYSTEM_SETTING.CANVAS_W - this.r; this.vx = 0; }
                    if (this.y - this.r < 0) { this.y = this.r; this.vy = 0; }
                    if (this.y + this.r * 2.5 > SYSTEM_SETTING.CANVAS_H) { this.y = SYSTEM_SETTING.CANVAS_H - this.r * 2.5; this.vy = 0; }

                    // CONTINUOUS FIRE THRUSTER JET PROPULSION EMITTERS (喷射器)
                    if (STATE_CORE.ticks % 2 === 0) {
                        const thrustX = this.x;
                        const thrustY = this.y + this.r + 12;
                        // Fire orange/cyan split streams particles down
                        spawnVectorSpark(thrustX + (Math.random() - 0.5) * 6, thrustY, 4, '#ff5500', (Math.random() - 0.5) * 2, 7.0 + Math.random() * 4, 18);
                        spawnVectorSpark(thrustX, thrustY, 2.5, '#00ffff', (Math.random() - 0.5) * 1, 9.0 + Math.random() * 5, 12);
                    }
                }

                draw(ctx) {
                    ctx.save();
                    
                    // Rainbow active color shifting modifier overrides
                    let primaryTheme = '#00f2fe';
                    if (STATE_CORE.twitchFramesRemaining > 0) {
                        primaryTheme = `hsl(${(STATE_CORE.ticks * 15) % 360}, 100%, 65%)`;
                    }

                    // 1. High Gloss Specular Sphere Shaded Radial Matrix
                    ctx.shadowBlur = 30; ctx.shadowColor = primaryTheme;
                    const glossGrad = ctx.createRadialGradient(this.x - 9, this.y - 9, 3, this.x, this.y, this.r);
                    glossGrad.addColorStop(0.0, '#ffffff');
                    glossGrad.addColorStop(0.2, primaryTheme);
                    glossGrad.addColorStop(0.7, '#040b24');
                    glossGrad.addColorStop(1.0, '#000000');
                    ctx.fillStyle = glossGrad;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();

                    // 2. Structural Layer Geometric Latitude/Longitude Mesh Lines (拒绝卡通)
                    ctx.shadowBlur = 0; ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)'; ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, this.r * 0.5, this.r, 0, 0, Math.PI * 2);
                    ctx.ellipse(this.x, this.y, this.r, this.r * 0.4, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    // 3. Steel Rigging Tension Carrier Cables
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)'; ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(this.x - 12, this.y + this.r - 2); ctx.lineTo(this.x - 8, this.y + this.r + 20);
                    ctx.moveTo(this.x + 12, this.y + this.r - 2); ctx.lineTo(this.x + 8, this.y + this.r + 20);
                    ctx.stroke();

                    // 4. Burner Combustion Engine Vent Core (喷射器本体)
                    ctx.fillStyle = '#111827'; ctx.strokeStyle = primaryTheme; ctx.lineWidth = 2;
                    ctx.fillRect(this.x - 5, this.y + this.r + 4, 10, 8);
                    ctx.strokeRect(this.x - 5, this.y + this.r + 4, 10, 8);

                    // 5. Cargo Metallic Woven Fuel Basket Capsule Container
                    ctx.fillStyle = '#080d22'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1.5;
                    ctx.fillRect(this.x - 10, this.y + this.r + 20, 20, 12);
                    ctx.strokeRect(this.x - 10, this.y + this.r + 20, 20, 12);

                    ctx.restore();
                }
            }

            // ==========================================================================
            // REAL CLASS DRIVEN BLACK IRON 💣 BOMB WITH LIVE SPARK FUSE PIPELINES
            // ==========================================================================
            class RealisticCastIronBomb {
                constructor() {
                    this.r = 22;
                    this.x = Math.random() * (SYSTEM_SETTING.CANVAS_W - 80) + 40;
                    this.y = -this.r - 30;
                }
                update() {
                    this.y += SYSTEM_SETTING.SCROLL_SPEED_BASE * STATE_CORE.speedMultiplier;
                    
                    // Emit sparks from the fuse tip continually
                    if (STATE_CORE.ticks % 2 === 0) {
                        const fuseTipX = this.x + 14; const fuseTipY = this.y - 24;
                        spawnVectorSpark(fuseTipX, fuseTipY, 3, '#ffd700', (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4 - 2, 15);
                        spawnVectorSpark(fuseTipX, fuseTipY, 2, '#ff3300', (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, 10);
                    }
                }
                draw(ctx) {
                    ctx.save();
                    ctx.shadowBlur = 15; ctx.shadowColor = '#000000';
                    
                    // 1. Draw Vector Fuse Cord Curve
                    ctx.strokeStyle = '#d97706'; ctx.lineWidth = 2.5; ctx.beginPath();
                    ctx.moveTo(this.x, this.y - this.r); ctx.quadraticCurveTo(this.x + 8, this.y - this.r - 12, this.x + 14, this.y - 24);
                    ctx.stroke();

                    // 2. Metallic Blast Shell Gradient Spherical Ring
                    const ironGrad = ctx.createRadialGradient(this.x - 6, this.y - 6, 2, this.x, this.y, this.r);
                    ironGrad.addColorStop(0.0, '#4b5563'); ironGrad.addColorStop(0.5, '#1f2937'); ironGrad.addColorStop(1.0, '#111827');
                    ctx.fillStyle = ironGrad;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();

                    // 3. Top Cylinder Ring Guard Mount Component
                    ctx.fillStyle = '#374151'; ctx.fillRect(this.x - 6, this.y - this.r - 4, 12, 5);

                    // 4. Draw Core Text Hazard Overlay Signage Symbol instead of cartoon emojis
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.7)'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('TNT', this.x, this.y + 4);
                    
                    ctx.restore();
                }
            }

            // ==========================================================================
            // SPECIAL PURPOSE EXCITON TRIGGER:五彩大抽搐霓虹炫目炸弹 💣
            // ==========================================================================
            class NeonRainbowTriggerBomb {
                constructor() {
                    this.r = 20;
                    this.x = Math.random() * (SYSTEM_SETTING.CANVAS_W - 80) + 40;
                    this.y = -this.r - 40;
                }
                update() { this.y += (SYSTEM_SETTING.SCROLL_SPEED_BASE * 1.1) * STATE_CORE.speedMultiplier; }
                draw(ctx) {
                    ctx.save();
                    const hueCycle = (STATE_CORE.ticks * 20) % 360;
                    const rainbowColor = `hsl(${hueCycle}, 100%, 55%)`;
                    ctx.shadowBlur = 35; ctx.shadowColor = rainbowColor;

                    // Fuse drawing mechanics
                    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2; ctx.beginPath();
                    ctx.moveTo(this.x, this.y - this.r); ctx.lineTo(this.x + 12, this.y - this.r - 16); ctx.stroke();

                    const radGrad = ctx.createRadialGradient(this.x, this.y, 2, this.x, this.y, this.r);
                    radGrad.addColorStop(0, '#ffffff'); radGrad.addColorStop(0.5, rainbowColor); radGrad.addColorStop(1, '#000000');
                    ctx.fillStyle = radGrad;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.fillStyle = '#000000'; ctx.font = '900 13px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('RGB', this.x, this.y);
                    ctx.restore();
                }
            }

            // ==========================================================================
            // SPECULAR LAVA TEXTURED METEOR ENTITY MATRIX
            // ==========================================================================
            class CraggedLavaVeinMeteor {
                constructor() {
                    this.r = 20 + Math.random() * 22;
                    this.x = Math.random() * (SYSTEM_SETTING.CANVAS_W - 100) + 50;
                    this.y = -this.r - 50;
                    this.vy = (SYSTEM_SETTING.SCROLL_SPEED_BASE * 1.3) + Math.random() * 4.0;
                    this.vx = (Math.random() - 0.5) * 3.0;
                }
                update() { this.y += this.vy * STATE_CORE.speedMultiplier; this.x += this.vx * STATE_CORE.speedMultiplier; }
                draw(ctx) {
                    ctx.save();
                    ctx.shadowBlur = 25; ctx.shadowColor = '#ff3c00';
                    ctx.fillStyle = '#0b060e'; ctx.strokeStyle = '#ff3c00'; ctx.lineWidth = 3;
                    
                    // Draw faceted polygonal jagged outer boundaries nodes
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const ang = (i * Math.PI * 2) / 8;
                        const offsetRadius = this.r * (0.85 + Math.sin(i * 3 + STATE_CORE.ticks * 0.05) * 0.12);
                        const px = this.x + Math.cos(ang) * offsetRadius;
                        const py = this.y + Math.sin(ang) * offsetRadius;
                        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                    }
                    ctx.closePath(); ctx.fill(); ctx.stroke();

                    // Internal incandescent superheated core magma faults
                    ctx.strokeStyle = 'rgba(255, 230, 0, 0.6)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(this.x - this.r * 0.4, this.y - this.r * 0.2); ctx.lineTo(this.x + this.r * 0.3, this.y + this.r * 0.4); ctx.stroke();
                    ctx.restore();
                }
            }

            // ==========================================================================
            // CHROME CHROMATIC LIQUID GOLD LIQUID LUSTRE 67 CHARACTER EXPORT
            // ==========================================================================
            class PolishedLiquidChrome67 {
                constructor() {
                    this.r = 60;
                    this.x = Math.random() * (SYSTEM_SETTING.CANVAS_W - 240) + 120;
                    this.y = -this.r - 60;
                    this.clock = Math.random() * Math.PI;
                    this.vSpeed = SYSTEM_SETTING.SCROLL_SPEED_BASE * 0.70;
                }
                update() {
                    this.y += this.vSpeed * STATE_CORE.speedMultiplier;
                    this.clock += 0.05; this.x += Math.sin(this.clock) * 7.0;
                }
                draw(ctx) {
                    ctx.save();
                    
                    // Real-time twitch reactive colour overrides layout mappings
                    let chromeGrad = ctx.createLinearGradient(this.x, this.y - this.r, this.x, this.y + this.r);
                    if (STATE_CORE.twitchFramesRemaining > 0) {
                        const randHue = Math.random() * 360;
                        chromeGrad.addColorStop(0.0, '#ffffff');
                        chromeGrad.addColorStop(0.5, `hsl(${randHue}, 100%, 50%)`);
                        chromeGrad.addColorStop(1.0, '#000000');
                        ctx.shadowColor = `hsl(${randHue}, 100%, 50%)`;
                    } else {
                        chromeGrad.addColorStop(0.0, '#ffffff'); chromeGrad.addColorStop(0.25, '#fff4b8');
                        chromeGrad.addColorStop(0.5, '#ffd700'); chromeGrad.addColorStop(0.75, '#a86200'); chromeGrad.addColorStop(1.0, '#ff2200');
                        ctx.shadowColor = '#ff6a00';
                    }
                    
                    ctx.shadowBlur = 40; ctx.fillStyle = chromeGrad;
                    ctx.font = '900 120px Impact, Arial Black, sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText('67', this.x, this.y);
                    ctx.restore();
                }
            }

            class SpecularGoldCoinItem {
                constructor() {
                    this.r = 14; this.x = Math.random() * (SYSTEM_SETTING.CANVAS_W - 40) + 20; this.y = -30;
                    this.rot = Math.random() * Math.PI;
                }
                update() { this.y += SYSTEM_SETTING.SCROLL_SPEED_BASE * STATE_CORE.speedMultiplier; this.rot += 0.08; }
                draw(ctx) {
                    ctx.save(); ctx.translate(this.x, this.y); ctx.scale(Math.cos(this.rot), 1);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffd700';
                    const cGrad = ctx.createLinearGradient(-14, -14, 14, 14);
                    cGrad.addColorStop(0, '#ffd700'); cGrad.addColorStop(0.5, '#ffffff'); cGrad.addColorStop(1, '#b58600');
                    ctx.fillStyle = cGrad; ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
            }

            class VolumetricSparkParticle {
                constructor(x, y, r, col, vx, vy, life) {
                    this.x = x; this.y = y; this.r = r; this.col = col; this.vx = vx; this.vy = vy; this.max = life; this.life = life;
                }
                update() { this.x += this.vx; this.y += this.vy; this.life--; }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.life / this.max; ctx.fillStyle = this.col;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
            }

            class FloatingNotification {
                constructor(x, y, txt, col) { this.x = x; this.y = y; this.txt = txt; this.col = col; this.life = 45; }
                update() { this.y -= 1.5; this.life--; }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.life / 45; ctx.font = '900 22px monospace';
                    ctx.fillStyle = this.col; ctx.textAlign = 'center'; ctx.fillText(this.txt, this.x, this.y); ctx.restore();
                }
            }

            function spawnVectorSpark(x, y, r, col, vx, vy, life) {
                if (STATE_CORE.particles.length > SYSTEM_SETTING.LIMITS.SPARKS) return;
                STATE_CORE.particles.push(new VolumetricSparkParticle(x, y, r, col, vx, vy, life));
            }

            function triggerBurstCloud(x, y, count, color) {
                for (let i = 0; i < count; i++) {
                    const ang = Math.random() * Math.PI * 2; const mag = 2.0 + Math.random() * 9.0;
                    spawnVectorSpark(x, y, 1.5 + Math.random() * 4.0, color, Math.cos(ang) * mag, Math.sin(ang) * mag, 35);
                }
            }

            // ==========================================================================
            // SYSTEM LOGIC TRACKER & REAL INTERSECTION OVERLAY PROCESSORS
            // ==========================================================================
            function executeIntersectionVerificationMatrix() {
                if (!STATE_CORE.balloon || STATE_CORE.over) return;
                const h = STATE_CORE.balloon;

                // 1. Regular Coin Acquisition Pool
                for (let i = STATE_CORE.coins.length - 1; i >= 0; i--) {
                    const c = STATE_CORE.coins[i];
                    if (Math.hypot(h.x - c.x, h.y - c.y) < h.r + c.r) {
                        STATE_CORE.score += 25; UI_DOM.score.textContent = formatScore(STATE_CORE.score);
                        triggerAudioBeep('coin');
                        STATE_CORE.floats.push(new FloatingNotification(c.x, c.y, '+$25', '#ffd700'));
                        triggerBurstCloud(c.x, c.y, 12, '#ffd700');
                        STATE_CORE.coins.splice(i, 1);
                    }
                }

                // 2. CRITICAL TRIGGER:撞击“五彩炸弹”开启极致疯狂全局大抽搐
                for (let i = STATE_CORE.rainbowBombs.length - 1; i >= 0; i--) {
                    const rb = STATE_CORE.rainbowBombs[i];
                    if (Math.hypot(h.x - rb.x, h.y - rb.y) < h.r + rb.r) {
                        triggerAudioBeep('twitch');
                        STATE_CORE.twitchFramesRemaining = 120; // 持续120帧的高频超级抽搐
                        document.body.classList.add('glitch-twitch-active');
                        
                        STATE_CORE.floats.push(new FloatingNotification(h.x, h.y - 45, 'RAINBOW GLITCH MATRIX!!!', '#ff00ff'));
                        triggerBurstCloud(rb.x, rb.y, 40, '#00ffcc');
                        STATE_CORE.rainbowBombs.splice(i, 1);
                    }
                }

                // 3. Black Iron Bomb Impact Terminal Destruction Chain
                for (let i = STATE_CORE.bombs.length - 1; i >= 0; i--) {
                    const b = STATE_CORE.bombs[i];
                    if (Math.hypot(h.x - b.x, h.y - b.y) < h.r + b.r) { terminateEngineRuntime(); return; }
                }

                // 4. Cragged Lava Meteor Shard Lethal Overlap
                for (let i = STATE_CORE.meteors.length - 1; i >= 0; i--) {
                    const m = STATE_CORE.meteors[i];
                    if (Math.hypot(h.x - m.x, h.y - m.y) < h.r + m.r) { terminateEngineRuntime(); return; }
                }

                // 5. Chrome Liquid 67 Massive Object Destruction Overlap
                for (let i = STATE_CORE.chromes67.length - 1; i >= 0; i--) {
                    const ch = STATE_CORE.chromes67[i];
                    if (Math.hypot(h.x - ch.x, h.y - ch.y) < h.r + ch.r) { terminateEngineRuntime(); return; }
                }
            }

            // ==========================================================================
            // REALTIME CENTRALIZED PIPELINE CLOCK HEARTBEAT
            // ==========================================================================
            function coreEngineRuntimeTick() {
                if (!STATE_CORE.running) return;

                STATE_CORE.ticks++;
                STATE_CORE.phaseCounter++;

                // Seamless Background Atmosphere Matrix Shifter Loop
                if (STATE_CORE.phaseCounter >= SYSTEM_SETTING.ENVIRONMENT_DURATION) {
                    STATE_CORE.phaseCounter = 0;
                    if (STATE_CORE.envPhase === 'DAYTIME') STATE_CORE.envPhase = 'TWILIGHT';
                    else if (STATE_CORE.envPhase === 'TWILIGHT') STATE_CORE.envPhase = 'NIGHTFALL';
                    else STATE_CORE.envPhase = 'DAYTIME';
                    UI_DOM.phase.textContent = STATE_CORE.envPhase;
                }

                // Glitch Twitch Decayer Frames Tracker
                if (STATE_CORE.twitchFramesRemaining > 0) {
                    STATE_CORE.twitchFramesRemaining--;
                    if (STATE_CORE.twitchFramesRemaining <= 0) {
                        document.body.classList.remove('glitch-twitch-active');
                    }
                }

                // Factory Allocator Scheduling Blocks
                if (STATE_CORE.ticks % 30 === 0 && STATE_CORE.coins.length < SYSTEM_SETTING.LIMITS.ITEMS) STATE_CORE.coins.push(new SpecularGoldCoinItem());
                if (STATE_CORE.ticks % 65 === 0 && STATE_CORE.bombs.length < SYSTEM_SETTING.LIMITS.BOMBS) STATE_CORE.bombs.push(new RealisticCastIronBomb());
                if (STATE_CORE.ticks % 85 === 0 && STATE_CORE.meteors.length < SYSTEM_SETTING.LIMITS.METEORS) STATE_CORE.meteors.push(new CraggedLavaVeinMeteor());
                if (STATE_CORE.ticks % 150 === 0 && STATE_CORE.chromes67.length < SYSTEM_SETTING.LIMITS.CHROMES) STATE_CORE.chromes67.push(new PolishedLiquidChrome67());
                
                // Specific specialized custom RGB bomb spawning timeline interval
                if (STATE_CORE.ticks % 200 === 0) STATE_CORE.rainbowBombs.push(new NeonRainbowTriggerBomb());

                // Update Object Translational Arrays Positions
                STATE_CORE.balloon.update();
                
                [STATE_CORE.coins, STATE_CORE.bombs, STATE_CORE.meteors, STATE_CORE.chromes67, STATE_CORE.rainbowBombs].forEach(arr => {
                    for (let i = arr.length - 1; i >= 0; i--) {
                        arr[i].update(); if (arr[i].y > SYSTEM_SETTING.CANVAS_H + 90) arr.splice(i, 1);
                    }
                });

                for (let i = STATE_CORE.particles.length - 1; i >= 0; i--) {
                    STATE_CORE.particles[i].update(); if (STATE_CORE.particles[i].life <= 0) STATE_CORE.particles.splice(i, 1);
                }
                for (let i = STATE_CORE.floats.length - 1; i >= 0; i--) {
                    STATE_CORE.floats[i].update(); if (STATE_CORE.floats[i].life <= 0) STATE_CORE.floats.splice(i, 1);
                }

                executeIntersectionVerificationMatrix();

                // Clear Frame & Dynamic Ambient Shading Processors
                const ctx = STATE_CORE.ctx;
                const bgGrad = ctx.createLinearGradient(0, 0, 0, SYSTEM_SETTING.CANVAS_H);
                
                if (STATE_CORE.twitchFramesRemaining > 0) {
                    // Inject erratic flashing backgrounds into canvas context directly under glitch rules
                    bgGrad.addColorStop(0, Math.random() > 0.5 ? '#ff00ff' : '#000000');
                    bgGrad.addColorStop(1, Math.random() > 0.5 ? '#00ffff' : '#010206');
                } else {
                    if (STATE_CORE.envPhase === 'DAYTIME') { bgGrad.addColorStop(0, '#020b2b'); bgGrad.addColorStop(1, '#0b1d54'); }
                    else if (STATE_CORE.envPhase === 'TWILIGHT') { bgGrad.addColorStop(0, '#210424'); bgGrad.addColorStop(1, '#080112'); }
                    else { bgGrad.addColorStop(0, '#010104'); bgGrad.addColorStop(1, '#020208'); }
                }
                ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, SYSTEM_SETTING.CANVAS_W, SYSTEM_SETTING.CANVAS_H);

                // Laser Neon Alignment Tracking Grid Systems (高清原生，无大头彩电黑线条)
                ctx.strokeStyle = STATE_CORE.twitchFramesRemaining > 0 ? 'rgba(255,255,255,0.2)' : 'rgba(0, 242, 254, 0.05)';
                ctx.lineWidth = 1;
                const step = 64;
                for (let x = 0; x < SYSTEM_SETTING.CANVAS_W; x += step) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, SYSTEM_SETTING.CANVAS_H); ctx.stroke(); }
                const scrollOffset = (STATE_CORE.ticks * 3.5) % step;
                for (let y = scrollOffset; y < SYSTEM_SETTING.CANVAS_H; y += step) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(SYSTEM_SETTING.CANVAS_W, y); ctx.stroke(); }

                // Instanced Pools Elements Frame Redraw pipelines
                STATE_CORE.coins.forEach(c => c.draw(ctx));
                STATE_CORE.bombs.forEach(b => b.draw(ctx));
                STATE_CORE.meteors.forEach(m => m.draw(ctx));
                STATE_CORE.chromes67.forEach(ch => ch.draw(ctx));
                STATE_CORE.rainbowBombs.forEach(rb => rb.draw(ctx));
                
                STATE_CORE.balloon.draw(ctx);
                
                STATE_CORE.particles.forEach(p => p.draw(ctx));
                STATE_CORE.floats.forEach(f => f.draw(ctx));

                requestAnimationFrame(coreEngineRuntimeTick);
            }

            function executePassiveRenderClear() {
                if (STATE_CORE.running) return;
                if (STATE_CORE.ctx) { STATE_CORE.ctx.fillStyle = '#010103'; STATE_CORE.ctx.fillRect(0, 0, SYSTEM_SETTING.CANVAS_W, SYSTEM_SETTING.CANVAS_H); }
                requestAnimationFrame(executePassiveRenderClear);
            }

            // ==========================================================================
            // HIGH-PRECISION SWIPE VECTOR CAPTURE MECHANISM (SNAKE PARADIGM GESTURES)
            // ==========================================================================
            function bootUpPipelineEngine() {
                unlockAudioHardware();
                flushResetMemoryState();

                STATE_CORE.running = true; STATE_CORE.over = false;
                UI_DOM.mask.style.display = 'none'; UI_DOM.hud.style.display = 'flex';

                // BIND GLOBAL SWIPE GESTURE DETECTING CHANNELS (手滑操作核心)
                window.addEventListener('touchstart', touchStartGate, { passive: false });
                window.addEventListener('touchmove', touchMoveGate, { passive: false });
                window.addEventListener('touchend', touchEndGate, { passive: false });

                // Keyboard Smooth Backup Listeners Mappings
                window.addEventListener('keydown', keyboardStateGate);
                window.addEventListener('keyup', keyboardStateGate);

                requestAnimationFrame(coreEngineRuntimeTick);
            }

            function touchStartGate(e) {
                e.preventDefault(); unlockAudioHardware();
                if (e.touches.length > 0) {
                    const t = e.touches[0];
                    STATE_CORE.swipe.startX = t.clientX; STATE_CORE.swipe.startY = t.clientY;
                    STATE_CORE.swipe.deltaX = 0; STATE_CORE.swipe.deltaY = 0;
                    STATE_CORE.swipe.active = true;
                }
            }

            function touchMoveGate(e) {
                e.preventDefault();
                if (STATE_CORE.swipe.active && e.touches.length > 0) {
                    const t = e.touches[0];
                    // Dynamic offset trace vector mapping lengths
                    STATE_CORE.swipe.deltaX = t.clientX - STATE_CORE.swipe.startX;
                    STATE_CORE.swipe.deltaY = t.clientY - STATE_CORE.swipe.startY;
                }
            }

            function touchEndGate(e) {
                e.preventDefault();
                STATE_CORE.swipe.active = false;
                STATE_CORE.swipe.deltaX = 0; STATE_CORE.swipe.deltaY = 0;
            }

            function keyboardStateGate(e) {
                const press = e.type === 'keydown';
                if (press) {
                    STATE_CORE.swipe.active = true;
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') STATE_CORE.swipe.deltaX = -60;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') STATE_CORE.swipe.deltaX = 60;
                    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') STATE_CORE.swipe.deltaY = -50;
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') STATE_CORE.swipe.deltaY = 50;
                    
                    if (e.key === '1') adjustSpeedGate('LOW', UI_DOM.rLow);
                    if (e.key === '2') adjustSpeedGate('MED', UI_DOM.rMed);
                    if (e.key === '3') adjustSpeedGate('HIGH', UI_DOM.rHigh);
                } else {
                    STATE_CORE.swipe.active = false;
                    STATE_CORE.swipe.deltaX = 0; STATE_CORE.swipe.deltaY = 0;
                }
            }

            function terminateEngineRuntime() {
                STATE_CORE.running = false; STATE_CORE.over = true;
                triggerAudioBeep('blast');
                document.body.classList.remove('glitch-twitch-active');

                if (STATE_CORE.balloon) triggerBurstCloud(STATE_CORE.balloon.x, STATE_CORE.balloon.y, 60, '#00f2fe');

                if (STATE_CORE.score > STATE_CORE.highScore) {
                    STATE_CORE.highScore = STATE_CORE.score;
                    localStorage.setItem('cyber_v6_high', STATE_CORE.highScore.toString());
                    UI_DOM.high.textContent = formatScore(STATE_CORE.highScore);
                }

                UI_DOM.btn.textContent = 'START GAME';
                UI_DOM.mask.style.display = 'flex'; UI_DOM.hud.style.display = 'none';

                window.removeEventListener('touchstart', touchStartGate);
                window.removeEventListener('touchmove', touchMoveGate);
                window.removeEventListener('touchend', touchEndGate);
                window.removeEventListener('keydown', keyboardStateGate);
                window.removeEventListener('keyup', keyboardStateGate);
            }

            function flushResetMemoryState() {
                STATE_CORE.score = 0; STATE_CORE.ticks = 0; STATE_CORE.phaseCounter = 0;
                STATE_CORE.envPhase = 'DAYTIME'; STATE_CORE.twitchFramesRemaining = 0;
                UI_DOM.score.textContent = '000000'; UI_DOM.phase.textContent = 'DAYTIME';

                STATE_CORE.coins = []; STATE_CORE.bombs = []; STATE_CORE.meteors = [];
                STATE_CORE.chromes67 = []; STATE_CORE.rainbowBombs = [];
                STATE_CORE.particles = []; STATE_CORE.floats = [];

                STATE_CORE.balloon = new UltraRealisticHotAirBalloon();
            }
        })();
    </script>
</body>
