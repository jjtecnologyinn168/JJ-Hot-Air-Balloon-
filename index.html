<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JJ Hot Air Balloon </title>
    <style>
        /* ==========================================================================
           INDUSTRIAL RETINA GRAPHICS SYSTEM SHADER
           ========================================================================== */
        :root {
            --bg-base: #010206;
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff00ff;
            --neon-gold: #ffd700;
            --neon-lava: #ff3300;
            --pure-white: #ffffff;
            --font-engine: 'Consolas', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-base);
            font-family: var(--font-engine);
            color: var(--pure-white);
        }

        #viewport-container-layer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        /* 100% NATIVE ULTRA HD CRYSTAL RENDER TUBE - NO SCANLINES */
        canvas {
            display: block;
            background-color: #010103;
            border: 2px solid rgba(0, 242, 254, 0.4);
            box-shadow: 0 0 60px rgba(0, 242, 254, 0.25);
            z-index: 1;
        }

        /* Fully Fixed Real-Time Interactivity Heads-Up Display Master */
        #hud-master-frame {
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
            display: none; /* Managed via runtime state */
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;   /* High index to ensure tap registration over canvas */
            pointer-events: none; /* Inner blocks will override this */
        }

        .hud-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: auto; /* Enable touch/click logs */
        }

        .hud-panel-block {
            background: rgba(1, 2, 6, 0.92);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-left: 5px solid var(--neon-cyan);
            padding: 10px 18px;
            min-width: 160px;
        }

        .hud-label-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            margin-bottom: 2px;
        }

        .hud-data-value {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Speed Control Panel Core Blocks */
        .speed-control-row {
            display: flex;
            gap: 8px;
            pointer-events: auto;
        }

        .speed-btn-node {
            background: rgba(4, 9, 32, 0.9);
            border: 1px solid rgba(0, 242, 254, 0.5);
            color: var(--neon-cyan);
            padding: 8px 16px;
            font-size: 0.8rem;
            font-weight: 900;
            cursor: pointer;
            font-family: var(--font-engine);
            transition: all 0.1s linear;
        }

        .speed-btn-node.active {
            background: var(--neon-cyan);
            color: #000000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        /* Interactive Overlay Screens Layer Masks */
        .menu-overlay-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 2, 5, 0.96);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }

        .menu-inner-box {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .action-button-trigger {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 22px 76px;
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 8px;
            font-family: var(--font-engine);
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.2);
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .action-button-trigger:hover {
            background: var(--neon-cyan);
            color: #000000;
            box-shadow: 0 0 50px var(--neon-cyan);
        }

        /* SPECIAL STATE: GAME OVER PANEL COMPONENT OVERLAY */
        #game-over-screen-mask {
            display: none;
            background: rgba(5, 0, 0, 0.94);
            border: 3px solid var(--neon-lava);
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.4);
        }

        .game-over-title {
            font-size: 4rem;
            font-weight: 900;
            color: var(--neon-lava);
            text-shadow: 0 0 30px var(--neon-lava), 0 0 60px #ff0000;
            letter-spacing: 10px;
            margin-bottom: 5px;
            animation: textPulseBlast 0.2s infinite alternate;
        }

        .game-over-score-readout {
            font-size: 1.8rem;
            color: var(--pure-white);
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        @keyframes textPulseBlast {
            0% { transform: scale(0.98); filter: brightness(1); }
            100% { transform: scale(1.02); filter: brightness(1.3); }
        }

        /* Real Hardware Shaking Skew Twitch Modifiers For 67 Collisions */
        body.global-hardware-glitch-active #viewport-container-layer {
            animation: hardwareTwitchCore 0.04s infinite alternate linear;
        }

        @keyframes hardwareTwitchCore {
            0% { transform: translate(6px, -4px) rotate(1deg); background-color: #ff0077; }
            50% { transform: translate(-5px, 6px) rotate(-1deg); background-color: #00ffbc; }
            100% { transform: translate(3px, 3px) rotate(0deg); background-color: #bb00ff; }
        }
    </style>
</head>
<body>

    <div id="viewport-container-layer">
        
        <div id="hud-master-frame">
            <div class="hud-group">
                <div class="hud-panel-block">
                    <div class="hud-label-text">SCORE COUNTER</div>
                    <div class="hud-data-value" id="live-score-node">000000</div>
                </div>
                <div class="hud-panel-block" style="border-left-color: var(--neon-gold)">
                    <div class="hud-label-text">BEST RECORD</div>
                    <div class="hud-data-value" id="live-high-node" style="color: var(--neon-gold); text-shadow: 0 0 10px var(--neon-gold);">000000</div>
                </div>
            </div>

            <div class="hud-group" style="align-items: flex-end;">
                <div class="hud-panel-block" id="env-interactive-switcher" style="border-left-color: var(--neon-magenta); cursor: pointer;">
                    <div class="hud-label-text">MATRIX CHRONO (TAP)</div>
                    <div class="hud-data-value" id="live-phase-node" style="color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); font-size: 1.2rem;">DAYTIME</div>
                </div>
                <div class="speed-control-row">
                    <button class="speed-btn-node" id="speed-btn-low">LOW</button>
                    <button class="speed-btn-node active" id="speed-btn-med">MED</button>
                    <button class="speed-btn-node" id="speed-btn-high">HIGH</button>
                </div>
            </div>
        </div>

        <canvas id="industrialArcadeCanvas" width="768" height="1024"></canvas>

        <div class="menu-overlay-mask" id="main-gate-screen-mask">
            <div class="menu-inner-box">
                <button class="action-button-trigger" id="start-engine-btn">START GAME</button>
            </div>
        </div>

        <div class="menu-overlay-mask" id="game-over-screen-mask">
            <div class="menu-inner-box">
                <div class="game-over-title">GAME OVER</div>
                <div class="game-over-score-readout">FINAL SCORE: <span id="final-score-target" style="color: var(--neon-cyan); font-weight:900;">000000</span></div>
                <button class="action-button-trigger" id="restart-engine-btn" style="border-color: var(--neon-lava); color: var(--neon-lava); box-shadow: 0 0 25px rgba(255, 51, 0, 0.25);">RESTART GAME</button>
            </div>
        </div>

    </div>

    <script>
        (function () {
            'use strict';

            const SYSTEM_SETTING = {
                V_WIDTH: 768,
                V_HEIGHT: 1024,
                SNAKE_LERP_COEFF_X: 0.15, // Ultra smooth responsive snake vector drag interpolation
                SNAKE_LERP_COEFF_Y: 0.11,
                MAX_VELOCITY_CAP: 24.0,
                SCROLL_VELOCITY_BASE: 6.5,
                ENVIRONMENT_DURATION_TICKS: 1000,
                
                VELOCITY_RATIO_MODES: { LOW: 0.60, MED: 1.00, HIGH: 1.75 },
                ALLOCATION_CEILING: { COINS: 35, BOMBS: 12, METEORS: 15, CHROMES: 3, SPARKS: 500 }
            };

            const STATE_ENGINE = {
                ctx: null,
                isCurrentlyRunning: false,
                isGameOverState: false,
                totalElapsedTicks: 0,
                currentRunScore: 0,
                historicalHighScore: parseInt(localStorage.getItem('cyber_v7_high') || '0'),
                
                activeSpeedMultiplier: 1.00,
                activeEnvironmentPhase: "DAYTIME", // DAYTIME -> TWILIGHT -> NIGHTFALL
                phaseTimelineProgress: 0,
                
                // Entity Pools Arrays
                heroBalloon: null,
                coinsPool: [],
                bombsPool: [],
                meteorsPool: [],
                chromes67Pool: [],
                particlesPool: [],
                floatingTextsPool: [],
                
                // Continuous Swipe Tracking Structures (Snake Controls Input)
                swipeVector: { startX: 0, startY: 0, deltaX: 0, deltaY: 0, isTracking: false },
                
                hardwareTwitchTicksRemaining: 0,
                hardwareAudioContext: null
            };

            const DOM_CACHE = {
                gateMask: document.getElementById('main-gate-screen-mask'),
                gameOverMask: document.getElementById('game-over-screen-mask'),
                startBtn: document.getElementById('start-engine-btn'),
                restartBtn: document.getElementById('restart-engine-btn'),
                hudFrame: document.getElementById('hud-master-frame'),
                scoreLabel: document.getElementById('live-score-node'),
                highLabel: document.getElementById('live-high-node'),
                phaseLabel: document.getElementById('live-phase-node'),
                envSwitcherBlock: document.getElementById('env-interactive-switcher'),
                canvasNode: document.getElementById('industrialArcadeCanvas'),
                finalScoreText: document.getElementById('final-score-target'),
                btnLow: document.getElementById('speed-btn-low'),
                btnMed: document.getElementById('speed-btn-med'),
                btnHigh: document.getElementById('speed-btn-high')
            };

            // Setup Operational Event Subscriptions
            window.addEventListener('DOMContentLoaded', () => {
                STATE_ENGINE.ctx = DOM_CACHE.canvasNode.getContext('2d');
                DOM_CACHE.highLabel.textContent = padScoreString(STATE_ENGINE.historicalHighScore);
                
                calculateViewportScaleTransforms();
                window.addEventListener('resize', calculateViewportScaleTransforms);
                
                // Interactive HUD Clicks Subscriptions (100% Fixed and operational)
                DOM_CACHE.startBtn.addEventListener('click', executeEngineBootUpSequence);
                DOM_CACHE.restartBtn.addEventListener('click', executeEngineBootUpSequence);
                
                DOM_CACHE.btnLow.addEventListener('click', (e) => executeSpeedShiftEvent('LOW', e.currentTarget));
                DOM_CACHE.btnMed.addEventListener('click', (e) => executeSpeedShiftEvent('MED', e.currentTarget));
                DOM_CACHE.btnHigh.addEventListener('click', (e) => executeSpeedShiftEvent('HIGH', e.currentTarget));
                
                DOM_CACHE.envSwitcherBlock.addEventListener('click', executeManualEnvironmentShiftEvent);
                
                executePassiveLoopRenderer();
            });

            function calculateViewportScaleTransforms() {
                const targetRatio = SYSTEM_SETTING.V_WIDTH / SYSTEM_SETTING.V_HEIGHT;
                let clientW = window.innerWidth, clientH = window.innerHeight;
                if (clientW / clientH > targetRatio) {
                    clientW = clientH * targetRatio;
                } else {
                    clientH = clientW / targetRatio;
                }
                DOM_CACHE.canvasNode.style.width = `${clientW}px`;
                DOM_CACHE.canvasNode.style.height = `${clientH}px`;
            }

            function executeSpeedShiftEvent(modeString, domAnchor) {
                document.querySelectorAll('.speed-btn-node').forEach(b => b.classList.remove('active'));
                if (domAnchor) domAnchor.classList.add('active');
                STATE_ENGINE.activeSpeedMultiplier = SYSTEM_SETTING.VELOCITY_RATIO_MODES[modeString];
                dispatchSynthesizedBeepSound('click_tick');
            }

            function executeManualEnvironmentShiftEvent() {
                if (STATE_ENGINE.activeEnvironmentPhase === 'DAYTIME') STATE_ENGINE.activeEnvironmentPhase = 'TWILIGHT';
                else if (STATE_ENGINE.activeEnvironmentPhase === 'TWILIGHT') STATE_ENGINE.activeEnvironmentPhase = 'NIGHTFALL';
                else STATE_ENGINE.activeEnvironmentPhase = 'DAYTIME';
                DOM_CACHE.phaseLabel.textContent = STATE_ENGINE.activeEnvironmentPhase;
                dispatchSynthesizedBeepSound('click_tick');
            }

            function padScoreString(numValue) { return String(numValue).padStart(6, '0'); }

            // ==========================================================================
            // NATIVE SYNTHESIZED SOUND WAVE GENERATION MATRIX (NO EXTERNAL MP3 DEPENDENCY)
            // ==========================================================================
            function unlockHardwareAudioPipeline() {
                if (!STATE_ENGINE.hardwareAudioContext) {
                    STATE_ENGINE.hardwareAudioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (STATE_ENGINE.hardwareAudioContext.state === 'suspended') {
                    STATE_ENGINE.hardwareAudioContext.resume();
                }
            }

            function dispatchSynthesizedBeepSound(audioProfileId) {
                if (!STATE_ENGINE.hardwareAudioContext) return;
                const audioCtx = STATE_ENGINE.hardwareAudioContext;
                const timeNow = audioCtx.currentTime;
                
                try {
                    const oscillatorNode = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    switch (audioProfileId) {
                        case 'coin_pickup':
                            oscillatorNode.type = 'sine';
                            oscillatorNode.frequency.setValueAtTime(523.25, timeNow); // C5
                            oscillatorNode.frequency.setValueAtTime(1046.50, timeNow + 0.05); // C6 Specular Note
                            gainNode.gain.setValueAtTime(0.12, timeNow);
                            gainNode.gain.exponentialRampToValueAtTime(0.001, timeNow + 0.25);
                            break;
                        case 'twitch_clash_67':
                            oscillatorNode.type = 'sawtooth';
                            oscillatorNode.frequency.setValueAtTime(240, timeNow);
                            oscillatorNode.frequency.linearRampToValueAtTime(120, timeNow + 0.15);
                            oscillatorNode.frequency.setValueAtTime(480, timeNow + 0.16);
                            gainNode.gain.setValueAtTime(0.28, timeNow);
                            gainNode.gain.exponentialRampToValueAtTime(0.001, timeNow + 0.4);
                            break;
                        case 'click_tick':
                            oscillatorNode.type = 'sine';
                            oscillatorNode.frequency.setValueAtTime(783.99, timeNow); // G5
                            gainNode.gain.setValueAtTime(0.06, timeNow);
                            gainNode.gain.linearRampToValueAtTime(0.001, timeNow + 0.04);
                            break;
                        case 'lethal_blast_death':
                            oscillatorNode.type = 'square';
                            oscillatorNode.frequency.setValueAtTime(90, timeNow);
                            oscillatorNode.frequency.linearRampToValueAtTime(20, timeNow + 0.85);
                            gainNode.gain.setValueAtTime(0.45, timeNow);
                            gainNode.gain.exponentialRampToValueAtTime(0.001, timeNow + 0.9);
                            break;
                    }
                    
                    oscillatorNode.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillatorNode.start(timeNow);
                    oscillatorNode.stop(timeNow + 0.95);
                } catch (err) {
                    // Fail-safe mute catch block
                }
            }

            // ==========================================================================
            // ACTOR DEFINITION: HIGH RESOLUTION GRID-MESHED BALLOON WITH JET EMITTERS
            // ==========================================================================
            class HighGlossIndustrialBalloonHero {
                constructor() {
                    this.x = SYSTEM_SETTING.V_WIDTH / 2;
                    this.y = SYSTEM_SETTING.V_HEIGHT * 0.78;
                    this.radius = 28;
                    this.velX = 0; this.velY = 0;
                }

                updatePositionVectors() {
                    let targetVx = STATE_ENGINE.swipeVector.isTracking ? STATE_ENGINE.swipeVector.deltaX * 0.32 : 0;
                    let targetVy = STATE_ENGINE.swipeVector.isTracking ? STATE_ENGINE.swipeVector.deltaY * 0.32 : 0;

                    // Bound Acceleration Forces Thresholds
                    if (targetVx > SYSTEM_SETTING.MAX_VELOCITY_CAP) targetVx = SYSTEM_SETTING.MAX_VELOCITY_CAP;
                    if (targetVx < -SYSTEM_SETTING.MAX_VELOCITY_CAP) targetVx = -SYSTEM_SETTING.MAX_VELOCITY_CAP;
                    if (targetVy > SYSTEM_SETTING.MAX_VELOCITY_CAP) targetVy = SYSTEM_SETTING.MAX_VELOCITY_CAP;
                    if (targetVy < -SYSTEM_SETTING.MAX_VELOCITY_CAP) targetVy = -SYSTEM_SETTING.MAX_VELOCITY_CAP;

                    // High Precision Interpolation Engine (Snake Continuum Fluidity)
                    this.velX += (targetVx - this.velX) * SYSTEM_SETTING.SNAKE_LERP_COEFF_X;
                    this.velY += (targetVy - this.velY) * SYSTEM_SETTING.SNAKE_LERP_COEFF_Y;
                    this.x += this.velX * STATE_ENGINE.activeSpeedMultiplier;
                    this.y += this.velY * STATE_ENGINE.activeSpeedMultiplier;

                    // Canvas Boundary Rigid Locks
                    if (this.x - this.radius < 0) { this.x = this.radius; this.velX = 0; }
                    if (this.x + this.radius > SYSTEM_SETTING.V_WIDTH) { this.x = SYSTEM_SETTING.V_WIDTH - this.radius; this.velX = 0; }
                    if (this.y - this.radius < 0) { this.y = this.radius; this.velY = 0; }
                    if (this.y + this.radius * 2.6 > SYSTEM_SETTING.V_HEIGHT) { this.y = SYSTEM_SETTING.V_HEIGHT - this.radius * 2.6; this.velY = 0; }

                    // FIRE THRUSTER JET PROPULSION SYSTEM FLAME (根据滑行状态向下喷射火花粒子)
                    if (STATE_ENGINE.totalElapsedTicks % 2 === 0) {
                        const nozzleX = this.x;
                        const nozzleY = this.y + this.radius + 12;
                        // Linear Velocity Exhaust Matrix Shard Spawning
                        instantiateParticleNode(nozzleX + (Math.random() - 0.5) * 8, nozzleY, 4.5, '#ff4400', (Math.random() - 0.5) * 2, 8.0 + Math.random() * 4, 20);
                        instantiateParticleNode(nozzleX, nozzleY, 2.5, '#00fffa', (Math.random() - 0.5) * 1, 10.0 + Math.random() * 5, 12);
                    }
                }

                renderToContext(ctx) {
                    ctx.save();
                    
                    let reactiveThemeHex = '#00f2fe';
                    if (STATE_ENGINE.hardwareTwitchTicksRemaining > 0) {
                        reactiveThemeHex = `hsl(${(STATE_ENGINE.totalElapsedTicks * 24) % 360}, 100%, 60%)`;
                    }

                    // 1. Specular High Gloss Spherical Surface Gradient Layout Matrix (真一点)
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = reactiveThemeHex;
                    const balloonRadialGrad = ctx.createRadialGradient(this.x - 8, this.y - 8, 2, this.x, this.y, this.radius);
                    balloonRadialGrad.addColorStop(0.0, '#ffffff');
                    balloonRadialGrad.addColorStop(0.25, reactiveThemeHex);
                    balloonRadialGrad.addColorStop(0.75, '#020617');
                    balloonRadialGrad.addColorStop(1.0, '#000000');
                    ctx.fillStyle = balloonRadialGrad;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();

                    // 2. Translucent Geometric Longitude Grid Meshes (高精网格)
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.ellipse(this.x, this.y, this.radius * 0.55, this.radius, 0, 0, Math.PI * 2);
                    ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.45, 0, 0, Math.PI * 2);
                    ctx.stroke();

                    // 3. High Tensile Solid Steel Suspension Cables
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
                    ctx.lineWidth = 1.2;
                    ctx.beginPath();
                    ctx.moveTo(this.x - 14, this.y + this.radius - 2); ctx.lineTo(this.x - 8, this.y + this.radius + 22);
                    ctx.moveTo(this.x + 14, this.y + this.radius - 2); ctx.lineTo(this.x + 8, this.y + this.radius + 22);
                    ctx.stroke();

                    // 4. Burner Unit Vent Box Assembly (喷射器模块)
                    ctx.fillStyle = '#0f172a'; ctx.strokeStyle = reactiveThemeHex; ctx.lineWidth = 2;
                    ctx.fillRect(this.x - 6, this.y + this.radius + 4, 12, 8);
                    ctx.strokeRect(this.x - 6, this.y + this.radius + 4, 12, 8);

                    // 5. Chrome Reflection Cargo Woven Basket Capsule
                    ctx.fillStyle = '#030712'; ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2;
                    ctx.fillRect(this.x - 11, this.y + this.radius + 22, 22, 14);
                    ctx.strokeRect(this.x - 11, this.y + this.radius + 22, 22, 14);

                    ctx.restore();
                }
            }

            // ==========================================================================
            // REAL CLASS DRIVEN HAZARDS: BLACK METALLIC 💣 BOMB WITH BURNING SPARK FUSE
            // ==========================================================================
            class CastIronRealisticBomb {
                constructor() {
                    this.radiusDimensions = 22;
                    this.x = Math.random() * (SYSTEM_SETTING.V_WIDTH - 80) + 40;
                    this.y = -this.radiusDimensions - 30;
                }

                updateCalculations() {
                    this.y += SYSTEM_SETTING.SCROLL_VELOCITY_BASE * STATE_ENGINE.activeSpeedMultiplier;
                    
                    // Continually inject live superheated combustion sparks from the top fuse line tip
                    if (STATE_ENGINE.totalElapsedTicks % 2 === 0) {
                        const tipX = this.x + 15;
                        const tipY = this.y - 25;
                        instantiateParticleNode(tipX, tipY, 3.5, '#ffd700', (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4 - 2, 16);
                        instantiateParticleNode(tipX, tipY, 2, '#ff3300', (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, 10);
                    }
                }

                renderGraphics(ctx) {
                    ctx.save();
                    
                    // 1. Draw Vector Coiled Fuse Cord Line
                    ctx.strokeStyle = '#b45309'; ctx.lineWidth = 3; ctx.beginPath();
                    ctx.moveTo(this.x, this.y - this.radiusDimensions);
                    ctx.quadraticCurveTo(this.x + 8, this.y - this.radiusDimensions - 14, this.x + 15, this.y - 25);
                    ctx.stroke();

                    // 2. Cast Iron Spherical Gradient Fill Model
                    const ironRadialGrad = ctx.createRadialGradient(this.x - 6, this.y - 6, 2, this.x, this.y, this.radiusDimensions);
                    ironRadialGrad.addColorStop(0.0, '#4b5563');
                    ironRadialGrad.addColorStop(0.6, '#1f2937');
                    ironRadialGrad.addColorStop(1.0, '#090d16');
                    ctx.fillStyle = ironRadialGrad;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radiusDimensions, 0, Math.PI * 2); ctx.fill();

                    // 3. Top Mechanical Collar Mount Bracket
                    ctx.fillStyle = '#374151';
                    ctx.fillRect(this.x - 7, this.y - this.radiusDimensions - 4, 14, 5);

                    // 4. Clean Vector Typography Symbol Overlay
                    ctx.fillStyle = 'rgba(239, 68, 68, 0.85)';
                    ctx.font = 'black 11px monospace'; ctx.textAlign = 'center';
                    ctx.fillText('TNT', this.x, this.y + 4);

                    ctx.restore();
                }
            }

            // ==========================================================================
            // HAZARD ENTITY CODEBLOCK: JAGGER LAVA-FAULT METEORITES (陨石)
            // ==========================================================================
            class JaggedLavaVeinMeteorite {
                constructor() {
                    this.boundingRadius = 20 + Math.random() * 24;
                    this.x = Math.random() * (SYSTEM_SETTING.V_WIDTH - 100) + 50;
                    this.y = -this.boundingRadius - 40;
                    this.velocityY = (SYSTEM_SETTING.SCROLL_VELOCITY_BASE * 1.35) + Math.random() * 4.0;
                    this.velocityX = (Math.random() - 0.5) * 4.0;
                }

                updateCalculations() {
                    this.y += this.velocityY * STATE_ENGINE.activeSpeedMultiplier;
                    this.x += this.velocityX * STATE_ENGINE.activeSpeedMultiplier;
                }

                renderGraphics(ctx) {
                    ctx.save();
                    ctx.shadowBlur = 25; ctx.shadowColor = '#ff4400';
                    ctx.fillStyle = '#0d0714'; ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 3.5;
                    
                    // Construct octagonal sharp geometry vectors lines loops
                    ctx.beginPath();
                    for (let i = 0; i < 8; i++) {
                        const alphaAngle = (i * Math.PI * 2) / 8;
                        const individualRadius = this.boundingRadius * (0.88 + Math.sin(i * 4 + STATE_ENGINE.totalElapsedTicks * 0.04) * 0.1);
                        const targetPx = this.x + Math.cos(alphaAngle) * individualRadius;
                        const targetPy = this.y + Math.sin(alphaAngle) * individualRadius;
                        if (i === 0) ctx.moveTo(targetPx, targetPy); else ctx.lineTo(targetPx, targetPy);
                    }
                    ctx.closePath(); ctx.fill(); ctx.stroke();

                    // Render central lava cracks core vectors
                    ctx.strokeStyle = 'rgba(255, 217, 0, 0.7)'; ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.moveTo(this.x - this.boundingRadius * 0.4, this.y - this.boundingRadius * 0.3);
                    ctx.lineTo(this.x + this.boundingRadius * 0.3, this.y + this.boundingRadius * 0.5);
                    ctx.stroke();

                    ctx.restore();
                }
            }

            // ==========================================================================
            // OBJECT TYPE: HIGH LUSTRE SPECULAR CHROMIUM MATRIX 67 DEFIANT
            // ==========================================================================
            class PolishedLiquidChrome67Target {
                constructor() {
                    this.clashRadius = 55;
                    this.x = Math.random() * (SYSTEM_SETTING.V_WIDTH - 200) + 100;
                    this.y = -this.clashRadius - 50;
                    this.translationClock = Math.random() * Math.PI;
                    this.fallSpeedVelocity = SYSTEM_SETTING.SCROLL_VELOCITY_BASE * 0.75;
                }

                updateCalculations() {
                    this.y += this.fallSpeedVelocity * STATE_ENGINE.activeSpeedMultiplier;
                    this.translationClock += 0.06;
                    this.x += Math.sin(this.translationClock) * 7.5;
                }

                renderGraphics(ctx) {
                    ctx.save();
                    
                    let metallicLinearGrad = ctx.createLinearGradient(this.x, this.y - this.clashRadius, this.x, this.y + this.clashRadius);
                    if (STATE_ENGINE.hardwareTwitchTicksRemaining > 0) {
                        const erraticHue = Math.random() * 360;
                        metallicLinearGrad.addColorStop(0.0, '#ffffff');
                        metallicLinearGrad.addColorStop(0.5, `hsl(${erraticHue}, 100%, 55%)`);
                        metallicLinearGrad.addColorStop(1.0, '#000000');
                        ctx.shadowColor = `hsl(${erraticHue}, 100%, 55%)`;
                    } else {
                        metallicLinearGrad.addColorStop(0.0, '#ffffff');
                        metallicLinearGrad.addColorStop(0.25, '#fff5be');
                        metallicLinearGrad.addColorStop(0.5, '#ffd700');
                        metallicLinearGrad.addColorStop(0.75, '#b45309');
                        metallicLinearGrad.addColorStop(1.0, '#ff1e00');
                        ctx.shadowColor = '#ff7b00';
                    }

                    ctx.shadowBlur = 45;
                    ctx.fillStyle = metallicLinearGrad;
                    ctx.font = '900 120px Impact, Arial Black, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('67', this.x, this.y);

                    ctx.restore();
                }
            }

            // SPINNING HIGH VECTOR SPECULAR REWARD GOLD COINS
            class SpecularGoldRewardCoin {
                constructor() {
                    this.coinRadius = 14;
                    this.x = Math.random() * (SYSTEM_SETTING.V_WIDTH - 60) + 30;
                    this.y = -this.coinRadius - 20;
                    this.rotationRad = Math.random() * Math.PI;
                }
                updateCalculations() {
                    this.y += SYSTEM_SETTING.SCROLL_VELOCITY_BASE * STATE_ENGINE.activeSpeedMultiplier;
                    this.rotationRad += 0.09;
                }
                renderGraphics(ctx) {
                    ctx.save(); ctx.translate(this.x, this.y); ctx.scale(Math.cos(this.rotationRad), 1);
                    ctx.shadowBlur = 20; ctx.shadowColor = '#ffd700';
                    const goldGrad = ctx.createLinearGradient(-14, -14, 14, 14);
                    goldGrad.addColorStop(0, '#ffd700'); goldGrad.addColorStop(0.5, '#ffffff'); goldGrad.addColorStop(1, '#92400e');
                    ctx.fillStyle = goldGrad; ctx.beginPath(); ctx.arc(0, 0, this.coinRadius, 0, Math.PI * 2); ctx.fill();
                    ctx.restore();
                }
            }

            // VOLUMETRIC SIMULATION ENGINE PREREQUISITE PARTICLE AND NOTIFICATION VECTORS
            class StructuralSparkNode {
                constructor(x, y, r, col, vx, vy, life) {
                    this.x = x; this.y = y; this.radius = r; this.colorHex = col; this.vx = vx; this.vy = vy; this.maxLife = life; this.life = life;
                }
                update() { this.x += this.vx; this.y += this.vy; this.life--; }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.life / this.maxLife; ctx.fillStyle = this.colorHex;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
            }

            class FloatingNotificationNode {
                constructor(x, y, txt, col) { this.x = x; this.y = y; this.text = txt; this.color = col; this.lifeTicks = 50; }
                update() { this.y -= 1.4; this.lifeTicks--; }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.lifeTicks / 50; ctx.font = '900 22px monospace';
                    ctx.fillStyle = this.color; ctx.textAlign = 'center'; ctx.fillText(this.text, this.x, this.y); ctx.restore();
                }
            }

            function instantiateParticleNode(x, y, r, col, vx, vy, life) {
                if (STATE_ENGINE.particlesPool.length > SYSTEM_SETTING.ALLOCATION_CEILING.SPARKS) return;
                STATE_ENGINE.particlesPool.push(new StructuralSparkNode(x, y, r, col, vx, vy, life));
            }

            function instantiateExplosionClusterCloud(x, y, volumeCount, colorHex) {
                for (let i = 0; i < volumeCount; i++) {
                    const directionalAngle = Math.random() * Math.PI * 2;
                    const explosionMagnitude = 2.5 + Math.random() * 9.5;
                    STATE_ENGINE.particlesPool.push(new StructuralSparkNode(
                        x, y, 1.5 + Math.random() * 4.5, colorHex,
                        Math.cos(directionalAngle) * explosionMagnitude, Math.sin(directionalAngle) * explosionMagnitude, 38
                    ));
                }
            }

            // ==========================================================================
            // REAL TIME CENTRALIZED COLLISIONS CONFLICT INTERSECTION MODIFIER MATRIX
            // ==========================================================================
            function executeRealTimeIntersectionCollisions() {
                if (!STATE_ENGINE.heroBalloon || STATE_ENGINE.isGameOverState) return;
                const hero = STATE_ENGINE.heroBalloon;

                // 1. Specular Gold Coins Extraction Pipeline
                for (let i = STATE_ENGINE.coinsPool.length - 1; i >= 0; i--) {
                    const coinInstance = STATE_ENGINE.coinsPool[i];
                    if (Math.hypot(hero.x - coinInstance.x, hero.y - coinInstance.y) < hero.radius + coinInstance.coinRadius) {
                        STATE_ENGINE.currentRunScore += 25;
                        DOM_CACHE.scoreLabel.textContent = padScoreString(STATE_ENGINE.currentRunScore);
                        
                        dispatchSynthesizedBeepSound('coin_pickup');
                        STATE_ENGINE.floatingTextsPool.push(new FloatingNotificationNode(coinInstance.x, coinInstance.y, '+$25', '#ffd700'));
                        instantiateExplosionClusterCloud(coinInstance.x, coinInstance.y, 14, '#ffd700');
                        
                        STATE_ENGINE.coinsPool.splice(i, 1);
                    }
                }

                // 2. CRITICAL CHANGE: 撞击 67 不死，而是进入狂暴霓虹闪烁大抽搐！
                for (let i = STATE_ENGINE.chromes67Pool.length - 1; i >= 0; i--) {
                    const chromeInstance = STATE_ENGINE.chromes67Pool[i];
                    if (Math.hypot(hero.x - chromeInstance.x, hero.y - chromeInstance.y) < hero.radius + chromeInstance.clashRadius) {
                        
                        dispatchSynthesizedBeepSound('twitch_clash_67');
                        STATE_ENGINE.hardwareTwitchTicksRemaining = 150; // Trigger high frequency hardware shake loop for 150 frames
                        document.body.classList.add('global-hardware-glitch-active');
                        
                        STATE_ENGINE.currentRunScore += 100; // Reward bonus points on crash event
                        DOM_CACHE.scoreLabel.textContent = padScoreString(STATE_ENGINE.currentRunScore);
                        
                        STATE_ENGINE.floatingTextsPool.push(new FloatingNotificationNode(chromeInstance.x, chromeInstance.y, '67 TWITCH ACCEL!!', '#ff00ff'));
                        instantiateExplosionClusterCloud(chromeInstance.x, chromeInstance.y, 45, '#ff7300');
                        
                        STATE_ENGINE.chromes67Pool.splice(i, 1); // Delete asset upon destruction
                    }
                }

                // 3. Black Cast Iron Lethal Bomb Obstruction Pipeline (撞到会死)
                for (let i = STATE_ENGINE.bombsPool.length - 1; i >= 0; i--) {
                    const bombInstance = STATE_ENGINE.bombsPool[i];
                    if (Math.hypot(hero.x - bombInstance.x, hero.y - bombInstance.y) < hero.radius + bombInstance.radiusDimensions) {
                        executeTerminalEngineLossShutdown(); return;
                    }
                }

                // 4. Jagged Magma Meteor Shard Collision Path (撞到会死)
                for (let i = STATE_ENGINE.meteorsPool.length - 1; i >= 0; i--) {
                    const meteorInstance = STATE_ENGINE.meteorsPool[i];
                    if (Math.hypot(hero.x - meteorInstance.x, hero.y - meteorInstance.y) < hero.radius + meteorInstance.boundingRadius) {
                        executeTerminalEngineLossShutdown(); return;
                    }
                }
            }

            // ==========================================================================
            // GAME CORE TIMELINE CONTROLLER LOOPS
            // ==========================================================================
            function masterEnginePipelineClockCoreTick() {
                if (!STATE_ENGINE.isCurrentlyRunning) return;

                STATE_ENGINE.totalElapsedTicks++;
                STATE_ENGINE.phaseTimelineProgress++;

                // Automated Time Ambient Shifter Calculations Engine
                if (STATE_ENGINE.phaseTimelineProgress >= SYSTEM_SETTING.ENVIRONMENT_DURATION_TICKS) {
                    STATE_ENGINE.phaseTimelineProgress = 0;
                    if (STATE_ENGINE.activeEnvironmentPhase === 'DAYTIME') STATE_ENGINE.activeEnvironmentPhase = 'TWILIGHT';
                    else if (STATE_ENGINE.activeEnvironmentPhase === 'TWILIGHT') STATE_ENGINE.activeEnvironmentPhase = 'NIGHTFALL';
                    else STATE_ENGINE.activeEnvironmentPhase = 'DAYTIME';
                    DOM_CACHE.phaseLabel.textContent = STATE_ENGINE.activeEnvironmentPhase;
                }

                // Shifter Decayer For Active Glitch Frame States Tracking
                if (STATE_ENGINE.hardwareTwitchTicksRemaining > 0) {
                    STATE_ENGINE.hardwareTwitchTicksRemaining--;
                    if (STATE_ENGINE.hardwareTwitchTicksRemaining <= 0) {
                        document.body.classList.remove('global-hardware-glitch-active');
                    }
                }

                // Instantiation Generation Rate Factories Intervals Scheduling
                if (STATE_ENGINE.totalElapsedTicks % 30 === 0 && STATE_ENGINE.coinsPool.length < SYSTEM_SETTING.ALLOCATION_CEILING.COINS) {
                    STATE_ENGINE.coinsPool.push(new SpecularGoldRewardCoin());
                }
                if (STATE_ENGINE.totalElapsedTicks % 60 === 0 && STATE_ENGINE.bombsPool.length < SYSTEM_SETTING.ALLOCATION_CEILING.BOMBS) {
                    STATE_ENGINE.bombsPool.push(new CastIronRealisticBomb());
                }
                if (STATE_ENGINE.totalElapsedTicks % 80 === 0 && STATE_ENGINE.meteorsPool.length < SYSTEM_SETTING.ALLOCATION_CEILING.METEORS) {
                    STATE_ENGINE.meteorsPool.push(new JaggedLavaVeinMeteorite());
                }
                if (STATE_ENGINE.totalElapsedTicks % 140 === 0 && STATE_ENGINE.chromes67Pool.length < SYSTEM_SETTING.ALLOCATION_CEILING.CHROMES) {
                    STATE_ENGINE.chromes67Pool.push(new PolishedLiquidChrome67Target());
                }

                // Update Array Translations Vectors
                STATE_ENGINE.heroBalloon.updatePositionVectors();
                
                [STATE_ENGINE.coinsPool, STATE_ENGINE.bombsPool, STATE_ENGINE.meteorsPool, STATE_ENGINE.chromes67Pool].forEach(activeArray => {
                    for (let i = activeArray.length - 1; i >= 0; i--) {
                        activeArray[i].updateCalculations();
                        if (activeArray[i].y > SYSTEM_SETTING.V_HEIGHT + 100 || activeArray[i].x < -100 || activeArray[i].x > SYSTEM_SETTING.V_WIDTH + 100) {
                            activeArray.splice(i, 1);
                        }
                    }
                });

                for (let i = STATE_ENGINE.particlesPool.length - 1; i >= 0; i--) {
                    STATE_ENGINE.particlesPool[i].update();
                    if (STATE_ENGINE.particlesPool[i].life <= 0) STATE_ENGINE.particlesPool.splice(i, 1);
                }
                for (let i = STATE_ENGINE.floatingTextsPool.length - 1; i >= 0; i--) {
                    STATE_ENGINE.floatingTextsPool[i].update();
                    if (STATE_ENGINE.floatingTextsPool[i].lifeTicks <= 0) STATE_ENGINE.floatingTextsPool.splice(i, 1);
                }

                executeRealTimeIntersectionCollisions();

                // Master Canvas Draw Call Render Pipeline
                const ctx = STATE_ENGINE.ctx;
                const dynamicSkyGrad = ctx.createLinearGradient(0, 0, 0, SYSTEM_SETTING.V_HEIGHT);
                
                if (STATE_ENGINE.hardwareTwitchTicksRemaining > 0) {
                    // Inject direct canvas flashing palettes under glitch status
                    dynamicSkyGrad.addColorStop(0, Math.random() > 0.5 ? '#ff00ff' : '#010103');
                    dynamicSkyGrad.addColorStop(1, Math.random() > 0.5 ? '#00ffff' : '#03081e');
                } else {
                    if (STATE_ENGINE.activeEnvironmentPhase === 'DAYTIME') { dynamicSkyGrad.addColorStop(0, '#020b2b'); dynamicSkyGrad.addColorStop(1, '#0c1e56'); }
                    else if (STATE_ENGINE.activeEnvironmentPhase === 'TWILIGHT') { dynamicSkyGrad.addColorStop(0, '#230327'); dynamicSkyGrad.addColorStop(1, '#090114'); }
                    else { dynamicSkyGrad.addColorStop(0, '#010103'); dynamicSkyGrad.addColorStop(1, '#03030b'); }
                }
                ctx.fillStyle = dynamicSkyGrad; ctx.fillRect(0, 0, SYSTEM_SETTING.V_WIDTH, SYSTEM_SETTING.V_HEIGHT);

                // Draw Precision Native Laser Spatial Grids (高清纯净，彻底剪掉老旧电视机线)
                ctx.strokeStyle = STATE_ENGINE.hardwareTwitchTicksRemaining > 0 ? 'rgba(255,255,255,0.25)' : 'rgba(0, 242, 254, 0.06)';
                ctx.lineWidth = 1;
                const gridStepSize = 64;
                for (let x = 0; x < SYSTEM_SETTING.V_WIDTH; x += gridStepSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, SYSTEM_SETTING.V_HEIGHT); ctx.stroke(); }
                const currentScrollOffset = (STATE_ENGINE.totalElapsedTicks * 4.0) % gridStepSize;
                for (let y = currentScrollOffset; y < SYSTEM_SETTING.V_HEIGHT; y += gridStepSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(SYSTEM_SETTING.V_WIDTH, y); ctx.stroke(); }

                // Frame Draw Operational Object Instances Pipelines
                STATE_ENGINE.coinsPool.forEach(c => c.renderGraphics(ctx));
                STATE_ENGINE.bombsPool.forEach(b => b.renderGraphics(ctx));
                STATE_ENGINE.meteorsPool.forEach(m => m.renderGraphics(ctx));
                STATE_ENGINE.chromes67Pool.forEach(ch => ch.renderGraphics(ctx));
                
                STATE_ENGINE.heroBalloon.renderToContext(ctx);
                
                STATE_ENGINE.particlesPool.forEach(p => p.draw(ctx));
                STATE_ENGINE.floatingTextsPool.forEach(f => f.draw(ctx));

                requestAnimationFrame(masterEnginePipelineClockCoreTick);
            }

            function executePassiveLoopRenderer() {
                if (STATE_ENGINE.isCurrentlyRunning) return;
                if (STATE_ENGINE.ctx) {
                    STATE_ENGINE.ctx.fillStyle = '#010104';
                    STATE_ENGINE.ctx.fillRect(0, 0, SYSTEM_SETTING.V_WIDTH, SYSTEM_SETTING.V_HEIGHT);
                }
                requestAnimationFrame(executePassiveLoopRenderer);
            }

            // ==========================================================================
            // FIXED INTERACTION CONTROLLER DRAG CHANNELS BINDINGS (SNAKE PARADIGM GESTURES)
            // ==========================================================================
            function executeEngineBootUpSequence() {
                unlockHardwareAudioPipeline();
                flushResetRuntimeGlobalMemory();

                STATE_ENGINE.isCurrentlyRunning = true;
                STATE_ENGINE.isGameOverState = false;

                DOM_CACHE.gateMask.style.display = 'none';
                DOM_CACHE.gameOverMask.style.display = 'none';
                DOM_CACHE.hudFrame.style.display = 'flex';

                // BIND PURE SLIDE GESTURE HIGH SPEED CONTINUOUS TRACKERS (像贪吃蛇一样手滑操作)
                window.addEventListener('touchstart', interceptTouchStartPipe, { passive: false });
                window.addEventListener('touchmove', interceptTouchMovePipe, { passive: false });
                window.addEventListener('touchend', interceptTouchEndPipe, { passive: false });

                window.addEventListener('keydown', interceptKeyboardInputPipe);
                window.addEventListener('keyup', interceptKeyboardInputPipe);

                requestAnimationFrame(masterEnginePipelineClockCoreTick);
            }

            function interceptTouchStartPipe(e) {
                e.preventDefault(); unlockHardwareAudioPipeline();
                if (e.touches.length > 0) {
                    const primaryTouch = e.touches[0];
                    STATE_ENGINE.swipeVector.startX = primaryTouch.clientX;
                    STATE_ENGINE.swipeVector.startY = primaryTouch.clientY;
                    STATE_ENGINE.swipeVector.deltaX = 0;
                    STATE_ENGINE.swipeVector.deltaY = 0;
                    STATE_ENGINE.swipeVector.isTracking = true;
                }
            }

            function interceptTouchMovePipe(e) {
                e.preventDefault();
                if (STATE_ENGINE.swipeVector.isTracking && e.touches.length > 0) {
                    const primaryTouch = e.touches[0];
                    // Continuous drift dynamic delta calculation vectors
                    STATE_ENGINE.swipeVector.deltaX = primaryTouch.clientX - STATE_ENGINE.swipeVector.startX;
                    STATE_ENGINE.swipeVector.deltaY = primaryTouch.clientY - STATE_ENGINE.swipeVector.startY;
                }
            }

            function interceptTouchEndPipe(e) {
                e.preventDefault();
                STATE_ENGINE.swipeVector.isTracking = false;
                STATE_ENGINE.swipeVector.deltaX = 0; STATE_ENGINE.swipeVector.deltaY = 0;
            }

            function interceptKeyboardInputPipe(e) {
                const isKeyActive = e.type === 'keydown';
                if (isKeyActive) {
                    STATE_ENGINE.swipeVector.isTracking = true;
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') STATE_ENGINE.swipeVector.deltaX = -65;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') STATE_ENGINE.swipeVector.deltaX = 65;
                    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') STATE_ENGINE.swipeVector.deltaY = -55;
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') STATE_ENGINE.swipeVector.deltaY = 55;
                    
                    if (e.key === '1') executeSpeedShiftEvent('LOW', DOM_CACHE.btnLow);
                    if (e.key === '2') executeSpeedShiftEvent('MED', DOM_CACHE.btnMed);
                    if (e.key === '3') executeSpeedShiftEvent('HIGH', DOM_CACHE.btnHigh);
                } else {
                    STATE_ENGINE.swipeVector.isTracking = false;
                    STATE_ENGINE.swipeVector.deltaX = 0; STATE_ENGINE.swipeVector.deltaY = 0;
                }
            }

            // ==========================================================================
            // TERMINAL DESTRUCTION: GAME OVER CONTROLLER (有写东西，有数据展示)
            // ==========================================================================
            function executeTerminalEngineLossShutdown() {
                STATE_ENGINE.isCurrentlyRunning = false;
                STATE_ENGINE.isGameOverState = true;
                
                dispatchSynthesizedBeepSound('lethal_blast_death');
                document.body.classList.remove('global-hardware-glitch-active');

                if (STATE_ENGINE.heroBalloon) {
                    instantiateExplosionClusterCloud(STATE_ENGINE.heroBalloon.x, STATE_ENGINE.heroBalloon.y, 65, '#00f2fe');
                }

                if (STATE_ENGINE.currentRunScore > STATE_ENGINE.historicalHighScore) {
                    STATE_ENGINE.historicalHighScore = STATE_ENGINE.currentRunScore;
                    localStorage.setItem('cyber_v7_high', STATE_ENGINE.historicalHighScore.toString());
                    DOM_CACHE.highLabel.textContent = padScoreString(STATE_ENGINE.historicalHighScore);
                }

                // 写入最终分数展示并弹出专用的高对比度红色爆破画面
                DOM_CACHE.finalScoreText.textContent = padScoreString(STATE_ENGINE.currentRunScore);
                DOM_CACHE.gameOverMask.style.display = 'flex';
                DOM_CACHE.hudFrame.style.display = 'none';

                // Safely scrub active peripheral event triggers to avoid stack cluttering
                window.removeEventListener('touchstart', interceptTouchStartPipe);
                window.removeEventListener('touchmove', interceptTouchMovePipe);
                window.removeEventListener('touchend', interceptTouchEndPipe);
                window.removeEventListener('keydown', interceptKeyboardInputPipe);
                window.removeEventListener('keyup', interceptKeyboardInputPipe);
            }

            function flushResetRuntimeGlobalMemory() {
                STATE_ENGINE.currentRunScore = 0;
                STATE_ENGINE.totalElapsedTicks = 0;
                STATE_ENGINE.phaseTimelineProgress = 0;
                STATE_ENGINE.activeEnvironmentPhase = 'DAYTIME';
                STATE_ENGINE.hardwareTwitchTicksRemaining = 0;
                
                DOM_CACHE.scoreLabel.textContent = '000000';
                DOM_CACHE.phaseLabel.textContent = 'DAYTIME';

                STATE_ENGINE.coinsPool = [];
                STATE_ENGINE.bombsPool = [];
                STATE_ENGINE.meteorsPool = [];
                STATE_ENGINE.chromes67Pool = [];
                STATE_ENGINE.particlesPool = [];
                STATE_ENGINE.floatingTextsPool = [];

                STATE_ENGINE.heroBalloon = new HighGlossIndustrialBalloonHero();
            }

        })();
    </script>
</body>
</html>
