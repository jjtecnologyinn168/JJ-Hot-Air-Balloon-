<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title> JJ Hot Air Balloon </title>
    <style>
        /* ==========================================================================
           INDUSTRIAL-GRADE HIGH-END ARCADE SHADER SHEET
           ========================================================================== */
        :root {
            --cyber-bg: #010103;
            --neon-cyan: #00f2fe;
            --neon-magenta: #ff00ff;
            --neon-gold: #ffd700;
            --neon-lava: #ff3300;
            --text-white: #ffffff;
            --font-engine: 'Consolas', 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            outline: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--cyber-bg);
            font-family: var(--font-engine);
            color: var(--text-white);
        }

        #viewport-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
        }

        canvas {
            display: block;
            background-color: #010104;
            border: 2px solid rgba(0, 242, 254, 0.25);
            box-shadow: 0 0 50px rgba(0, 242, 254, 0.15);
        }

        /* Scanline CRT Screen Shader Effect */
        .crt-scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.35) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 10;
        }

        /* Professional Heads-Up Display */
        #hud-container {
            position: absolute;
            top: 24px;
            left: 24px;
            right: 24px;
            display: none;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 5;
            pointer-events: none;
        }

        .hud-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hud-panel {
            background: rgba(2, 3, 10, 0.85);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-left: 4px solid var(--neon-cyan);
            padding: 8px 16px;
            min-width: 150px;
        }

        .hud-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.5px;
        }

        .hud-data {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--neon-cyan);
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        /* Speed Control Matrix Interrupters Overlay */
        .speed-controller {
            display: flex;
            gap: 6px;
            pointer-events: auto;
        }

        .speed-node {
            background: rgba(5, 8, 24, 0.8);
            border: 1px solid rgba(0, 242, 254, 0.3);
            color: var(--neon-cyan);
            padding: 4px 10px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            font-family: var(--font-engine);
            transition: all 0.15s ease;
        }

        .speed-node.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* Main Entry Mask Overlay Screen */
        #menu-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 1, 3, 0.96);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        .center-box {
            text-align: center;
        }

        #start-btn {
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 20px 64px;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 6px;
            font-family: var(--font-engine);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        #start-btn:hover {
            background: var(--neon-cyan);
            color: #000000;
            box-shadow: 0 0 40px var(--neon-cyan);
        }

        #start-btn:active {
            transform: scale(0.96);
        }

        /* Seizure Screen Impact Flash Matrix Modifiers */
        body.rainbow-active-flash #viewport-wrapper {
            animation: hardwareFlashMatrix 0.08s infinite steps(2);
        }

        @keyframes hardwareFlashMatrix {
            0% { background-color: rgba(255, 0, 85, 0.6); }
            100% { background-color: rgba(0, 255, 204, 0.6); }
        }
    </style>
</head>
<body>

    <div id="viewport-wrapper">
        <div class="crt-scanlines"></div>
        
        <div id="hud-container">
            <div class="hud-group">
                <div class="hud-panel">
                    <div class="hud-label">CORE SCORE</div>
                    <div class="hud-data" id="score-readout">000000</div>
                </div>
                <div class="hud-panel" style="border-left-color: var(--neon-gold)">
                    <div class="hud-label">HIGH SCORE</div>
                    <div class="hud-data" id="high-readout" style="color: var(--neon-gold); text-shadow: 0 0 8px var(--neon-gold);">000000</div>
                </div>
            </div>

            <div class="hud-group" style="align-items: flex-end;">
                <div class="hud-panel" style="border-left-color: var(--neon-magenta)">
                    <div class="hud-label">ENVIRONMENT MATRIX</div>
                    <div class="hud-data" id="phase-readout" style="color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta); font-size: 1.1rem;">DAYTIME</div>
                </div>
                <div class="speed-controller">
                    <button class="speed-node" id="v-low">LOW</button>
                    <button class="speed-node active" id="v-med">MED</button>
                    <button class="speed-node" id="v-high">HIGH</button>
                </div>
            </div>
        </div>

        <canvas id="arcadeViewport" width="768" height="1024"></canvas>

        <div id="menu-mask">
            <div class="center-box">
                <button id="start-btn">START GAME</button>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            // Global Architecture Matrix Parameters
            const SYSTEM_CONFIG = {
                RENDER_WIDTH: 768,
                RENDER_HEIGHT: 1024,
                TARGET_FPS: 60,
                
                // Physics Friction and Inertia Limits (Snake Physics)
                SNAKE_LERP_ALPHA_X: 0.12, // Snake smooth fluid lag-free blend coefficients
                SNAKE_LERP_ALPHA_Y: 0.09,
                MAX_VELOCITY_CAP: 18.0,
                GLOBAL_SCROLL_BASE: 5.8,
                ENVIRONMENT_CYCLE_FRAMES: 800,
                
                VELOCITY_MULTIPLIER_MAP: { LOW: 0.60, MED: 1.00, HIGH: 1.65 },
                
                ALLOCATION_CAPS: { COINS: 35, METEORS: 20, BOSS67: 4, PARTICLES: 350 }
            };

            // Global Shared Hardware State Register
            const ENGINE_STATE = {
                ctx: null,
                isRunning: false,
                isGameOver: false,
                globalFrameCount: 0,
                
                currentScore: 0,
                highScore: parseInt(localStorage.getItem('cyber_v5_high') || '0'),
                
                activeVelocityMultiplier: 1.00,
                activeEnvironmentPhase: "DAYTIME", // DAYTIME -> TWILIGHT -> NIGHTFALL
                phaseTimelineProgress: 0,
                
                // Entities Storage Matrix Pools
                heroBalloonInstance: null,
                coinsPool: [],
                meteorsPool: [],
                boss67Pool: [],
                particlesPool: [],
                textIndicatorsPool: [],
                starfieldBackgroundPool: [],
                
                // Advanced Vector Swipe Hardware Captures
                touchControlVector: {
                    startX: 0, startY: 0,
                    currentX: 0, currentY: 0,
                    deltaX: 0, deltaY: 0,
                    isTracking: false
                },
                
                // Seizure Rainbow Modifiers Flash Parameters
                isRainbowFlashActive: false,
                rainbowFlashRemainingTicks: 0,
                
                // Sound System Context Pointer
                audioContextHardware: null
            };

            // DOM Interface Pointers Cache
            const DOM_INTERFACE = {
                mask: document.getElementById('menu-mask'),
                startBtn: document.getElementById('start-btn'),
                hud: document.getElementById('hud-container'),
                score: document.getElementById('score-readout'),
                high: document.getElementById('high-readout'),
                phase: document.getElementById('phase-readout'),
                canvas: document.getElementById('arcadeViewport'),
                vLow: document.getElementById('v-low'),
                vMed: document.getElementById('v-med'),
                vHigh: document.getElementById('v-high')
            };

            // ==========================================================================
            // SYSTEM BOOTSTRAP INITIALIZATION PROCEDURES
            // ==========================================================================
            window.addEventListener('DOMContentLoaded', () => {
                ENGINE_STATE.ctx = DOM_INTERFACE.canvas.getContext('2d');
                DOM_INTERFACE.high.textContent = formatScoreString(ENGINE_STATE.highScore);
                
                executeViewportResolutionScaling();
                generateCosmosBackgroundStarfield();
                
                // Main Entrance Action Listener Rule
                DOM_INTERFACE.startBtn.addEventListener('click', processHardwareEngineStartSequence);
                window.addEventListener('resize', executeViewportResolutionScaling);
                
                // Bind Speed Selector Matrix Nodes Buttons
                DOM_INTERFACE.vLow.addEventListener('click', (e) => switchActiveSpeedSetting('LOW', e.currentTarget));
                DOM_INTERFACE.vMed.addEventListener('click', (e) => switchActiveSpeedSetting('MED', e.currentTarget));
                DOM_INTERFACE.vHigh.addEventListener('click', (e) => switchActiveSpeedSetting('HIGH', e.currentTarget));
                
                executePrebootRenderPipe();
            });

            function executeViewportResolutionScaling() {
                const aspectTargetRatio = SYSTEM_CONFIG.RENDER_WIDTH / SYSTEM_CONFIG.RENDER_HEIGHT;
                let currentWidth = window.innerWidth;
                let currentHeight = window.innerHeight;

                if (currentWidth / currentHeight > aspectTargetRatio) {
                    currentWidth = currentHeight * aspectTargetRatio;
                } else {
                    currentHeight = currentWidth * aspectTargetRatio;
                }

                DOM_INTERFACE.canvas.style.width = `${currentWidth}px`;
                DOM_INTERFACE.canvas.style.height = `${currentHeight}px`;
            }

            function switchActiveSpeedSetting(mode, targetDom) {
                document.querySelectorAll('.speed-node').forEach(n => n.classList.remove('active'));
                if (targetDom) targetDom.classList.add('active');
                ENGINE_STATE.activeVelocityMultiplier = SYSTEM_CONFIG.VELOCITY_MULTIPLIER_MAP[mode];
                dispatchSynthesizedAudioBeep('click');
            }

            function formatScoreString(number) {
                return String(number).padStart(6, '0');
            }

            // ==========================================================================
            // REALTIME SYNTHESIZED LOW-LATENCY AUDIO INFRASTRUCTURE
            // ==========================================================================
            function unlockAudioHardwareSystem() {
                if (!ENGINE_STATE.audioContextHardware) {
                    ENGINE_STATE.audioContextHardware = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (ENGINE_STATE.audioContextHardware && ENGINE_STATE.audioContextHardware.state === 'suspended') {
                    ENGINE_STATE.audioContextHardware.resume();
                }
            }

            function dispatchSynthesizedAudioBeep(profileName) {
                if (!ENGINE_STATE.audioContextHardware) return;
                const ctx = ENGINE_STATE.audioContextHardware;
                const now = ctx.currentTime;
                
                try {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    switch (profileName) {
                        case 'coin_grab':
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(587.33, now); // D5
                            osc.frequency.setValueAtTime(1174.66, now + 0.06); // D6 Specular Note
                            gain.gain.setValueAtTime(0.12, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
                            break;
                        case 'boss_crash_67':
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(140, now);
                            osc.frequency.linearRampToValueAtTime(30, now + 0.5);
                            gain.gain.setValueAtTime(0.35, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.55);
                            break;
                        case 'swipe_vector':
                            osc.type = 'triangle';
                            osc.frequency.setValueAtTime(293.66, now);
                            osc.frequency.exponentialRampToValueAtTime(440.00, now + 0.08);
                            gain.gain.setValueAtTime(0.04, now);
                            gain.gain.linearRampToValueAtTime(0.001, now + 0.08);
                            break;
                        case 'click':
                            osc.type = 'sine';
                            osc.frequency.setValueAtTime(659.25, now);
                            gain.gain.setValueAtTime(0.05, now);
                            gain.gain.linearRampToValueAtTime(0.001, now + 0.04);
                            break;
                        case 'death_terminate':
                            osc.type = 'sawtooth';
                            osc.frequency.setValueAtTime(220, now);
                            osc.frequency.linearRampToValueAtTime(10, now + 0.75);
                            gain.gain.setValueAtTime(0.4, now);
                            gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                            break;
                    }
                    
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(now); osc.stop(now + 0.85);
                } catch (e) {
                    // Fail-safe protection matrix
                }
            }

            // ==========================================================================
            // ACTOR CLASS DEFINITIONS (HIGH REFLECTIVE GRADIENTS)
            // ==========================================================================
            class MetallicCyberBalloonHero {
                constructor() {
                    this.x = SYSTEM_CONFIG.RENDER_WIDTH / 2;
                    this.y = SYSTEM_CONFIG.RENDER_HEIGHT * 0.75;
                    this.boundingRadius = 26;
                    
                    this.velocityX = 0;
                    this.velocityY = 0;
                    this.targetVelocityX = 0;
                    this.targetVelocityY = 0;
                }

                updateCalculations() {
                    // Ingest low-latency continuous touch vector mappings
                    if (ENGINE_STATE.touchControlVector.isTracking) {
                        // Dynamic calculation scale mappings (Snake response fluidity multiplier)
                        this.targetVelocityX = ENGINE_STATE.touchControlVector.deltaX * 0.28;
                        this.targetVelocityY = ENGINE_STATE.touchControlVector.deltaY * 0.28;
                    } else {
                        // Friction decayer mapping loops when finger is released
                        this.targetVelocityX = 0;
                        this.targetVelocityY = 0;
                    }

                    // Strict Velocity Clamping Limit Rules
                    if (this.targetVelocityX > SYSTEM_CONFIG.MAX_VELOCITY_CAP) this.targetVelocityX = SYSTEM_CONFIG.MAX_VELOCITY_CAP;
                    if (this.targetVelocityX < -SYSTEM_CONFIG.MAX_VELOCITY_CAP) this.targetVelocityX = -SYSTEM_CONFIG.MAX_VELOCITY_CAP;
                    if (this.targetVelocityY > SYSTEM_CONFIG.MAX_VELOCITY_CAP) this.targetVelocityY = SYSTEM_CONFIG.MAX_VELOCITY_CAP;
                    if (this.targetVelocityY < -SYSTEM_CONFIG.MAX_VELOCITY_CAP) this.targetVelocityY = -SYSTEM_CONFIG.MAX_VELOCITY_CAP;

                    // High Precision Interp Linear Formula (Snake Fluid Vector Movement)
                    this.velocityX += (this.targetVelocityX - this.velocityX) * SYSTEM_CONFIG.SNAKE_LERP_ALPHA_X;
                    this.velocityY += (this.targetVelocityY - this.velocityY) * SYSTEM_CONFIG.SNAKE_LERP_ALPHA_Y;

                    this.x += this.velocityX * ENGINE_STATE.activeVelocityMultiplier;
                    this.y += this.velocityY * ENGINE_STATE.activeVelocityMultiplier;

                    // Hard Geometric Boundaries Mapping Locks
                    if (this.x - this.boundingRadius < 0) { this.x = this.boundingRadius; this.velocityX = 0; }
                    if (this.x + this.boundingRadius > SYSTEM_CONFIG.RENDER_WIDTH) { this.x = SYSTEM_CONFIG.RENDER_WIDTH - this.boundingRadius; this.velocityX = 0; }
                    if (this.y - this.boundingRadius < 0) { this.y = this.boundingRadius; this.velocityY = 0; }
                    if (this.y + this.boundingRadius * 2 > SYSTEM_CONFIG.RENDER_HEIGHT) { this.y = SYSTEM_CONFIG.RENDER_HEIGHT - this.boundingRadius * 2; this.velocityY = 0; }

                    // Continuous Propulsion Exhaust Vector Shards
                    if (ENGINE_STATE.globalFrameCount % 2 === 0 && (Math.abs(this.velocityX) > 0.5 || Math.abs(this.velocityY) > 0.5)) {
                        generateParticleNode(this.x, this.y + this.boundingRadius, 4, '#00f2fe', (Math.random() - 0.5) * 2.5, 4.0, 22);
                    }
                }

                renderGraphics(ctx) {
                    ctx.save();
                    
                    let neonStrokeTheme = '#00f2fe';
                    if (ENGINE_STATE.isRainbowFlashActive) {
                        const hue = (ENGINE_STATE.globalFrameCount * 12) % 360;
                        neonStrokeTheme = `hsl(${hue}, 100%, 60%)`;
                    }

                    ctx.shadowBlur = 25;
                    ctx.shadowColor = neonStrokeTheme;

                    // ADVANCED SHADER METHOD: Specular High-Reflective Sphere Radial Matrix
                    const sphereRadialGrad = ctx.createRadialGradient(
                        this.x - 8, this.y - 8, 2,
                        this.x, this.y, this.boundingRadius
                    );
                    sphereRadialGrad.addColorStop(0, '#ffffff');
                    sphereRadialGrad.addColorStop(0.3, neonStrokeTheme);
                    sphereRadialGrad.addColorStop(0.8, '#03091e');
                    sphereRadialGrad.addColorStop(1.0, '#000000');

                    ctx.fillStyle = sphereRadialGrad;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.boundingRadius, 0, Math.PI * 2);
                    ctx.fill();

                    // Real Structural Carbon Fiber Carrier Rigging Pipelines (No flat blocks)
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(this.x - 10, this.y + this.boundingRadius - 2);
                    ctx.lineTo(this.x - 6, this.y + this.boundingRadius + 18);
                    ctx.moveTo(this.x + 10, this.y + this.boundingRadius - 2);
                    ctx.lineTo(this.x + 6, this.y + this.boundingRadius + 18);
                    ctx.stroke();

                    // Metallic Storage Pod Basket Capsule
                    ctx.fillStyle = '#050a1a';
                    ctx.strokeStyle = neonStrokeTheme;
                    ctx.lineWidth = 2;
                    ctx.fillRect(this.x - 8, this.y + this.boundingRadius + 18, 16, 10);
                    ctx.strokeRect(this.x - 8, this.y + this.boundingRadius + 18, 16, 10);

                    ctx.restore();
                }
            }

            // ENEMY TYPE CLASS DEFINITION: LIQUID LUSTRE CHROME 67 ENTITY
            class PolishedChrome67Enemy {
                constructor() {
                    this.geometryRadius = 55;
                    this.x = Math.random() * (SYSTEM_CONFIG.RENDER_WIDTH - 200) + 100;
                    this.y = -this.geometryRadius - 50;
                    this.oscillationClock = Math.random() * Math.PI;
                    this.fallingVelocity = SYSTEM_CONFIG.GLOBAL_SCROLL_BASE * 0.75;
                }

                updateCalculations() {
                    this.y += this.fallingVelocity * ENGINE_STATE.activeVelocityMultiplier;
                    this.oscillationClock += 0.04;
                    this.x += Math.sin(this.oscillationClock) * 6.5;

                    // Volumetric Thermal Friction Spark Emitters
                    if (ENGINE_STATE.globalFrameCount % 3 === 0) {
                        generateParticleNode(this.x + (Math.random() - 0.5) * 40, this.y, 4, '#ffaa00', (Math.random() - 0.5) * 2, -3, 20);
                    }
                }

                renderGraphics(ctx) {
                    ctx.save();
                    ctx.shadowBlur = 35;
                    ctx.shadowColor = '#ff6600';

                    // ADVANCED SHADER METHOD: Linear Multilayer Liquid Gold Gradient Mapping
                    const chromeLinearGrad = ctx.createLinearGradient(
                        this.x, this.y - this.geometryRadius,
                        this.x, this.y + this.geometryRadius
                    );
                    chromeLinearGrad.addColorStop(0.0, '#ffffff');
                    chromeLinearGrad.addColorStop(0.25, '#fff2a3');
                    chromeLinearGrad.addColorStop(0.5, '#ffd700');
                    chromeLinearGrad.addColorStop(0.75, '#995500');
                    chromeLinearGrad.addColorStop(1.0, '#ff1100');

                    ctx.fillStyle = chromeLinearGrad;
                    ctx.font = '900 110px Impact, Arial Black, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    
                    // Render Vector Typography Nodes Instead of Cartoon Glyphs
                    ctx.fillText('67', this.x, this.y);

                    // Overlay System Target Target crosshair alignment loops
                    ctx.strokeStyle = 'rgba(255, 102, 0, 0.22)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(this.x - this.geometryRadius - 10, this.y - this.geometryRadius, (this.geometryRadius + 10) * 2, this.geometryRadius * 2);

                    ctx.restore();
                }
            }

            // SPECULAR 3D SPINNING COIN MODEL
            class SpecularGoldCoin {
                constructor() {
                    this.radiusDimensions = 15;
                    this.x = Math.random() * (SYSTEM_CONFIG.RENDER_WIDTH - this.radiusDimensions * 4) + this.radiusDimensions * 2;
                    this.y = -this.radiusDimensions - 30;
                    this.rotationAngleRad = Math.random() * Math.PI;
                    this.rotationalVelocity = 0.07 + Math.random() * 0.04;
                }

                updateCalculations() {
                    this.y += SYSTEM_CONFIG.GLOBAL_SCROLL_BASE * ENGINE_STATE.activeVelocityMultiplier;
                    this.rotationAngleRad += this.rotationalVelocity;
                }

                renderGraphics(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    
                    const widthScaleRatio = Math.cos(this.rotationAngleRad);
                    if (Math.abs(widthScaleRatio) < 0.02) { ctx.restore(); return; }
                    ctx.scale(widthScaleRatio, 1);

                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ffd700';

                    const coinGrad = ctx.createLinearGradient(-this.radiusDimensions, -this.radiusDimensions, this.radiusDimensions, this.radiusDimensions);
                    coinGrad.addColorStop(0.0, '#7a5c00');
                    coinGrad.addColorStop(0.4, '#ffd700');
                    coinGrad.addColorStop(0.7, '#ffffff');
                    coinGrad.addColorStop(1.0, '#543f00');

                    ctx.fillStyle = coinGrad;
                    ctx.beginPath(); ctx.arc(0, 0, this.radiusDimensions, 0, Math.PI * 2); ctx.fill();
                    
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(-2, -5, 4, 10);

                    ctx.restore();
                }
            }

            // CRAGGED LAVA HAZARDOUS METEOR SHARDS
            class CraggedLavaMeteor {
                constructor() {
                    this.boundingRadius = 18 + Math.random() * 18;
                    this.x = Math.random() * (SYSTEM_CONFIG.RENDER_WIDTH - this.boundingRadius * 2) + this.boundingRadius;
                    this.y = -this.boundingRadius - 40;
                    this.velocityY = (SYSTEM_CONFIG.GLOBAL_SCROLL_BASE * 1.2) + Math.random() * 3.8;
                    this.velocityX = (Math.random() - 0.5) * 3.5;
                }

                updateCalculations() {
                    this.y += this.velocityY * ENGINE_STATE.activeVelocityMultiplier;
                    this.x += this.velocityX * ENGINE_STATE.activeVelocityMultiplier;
                }

                renderGraphics(ctx) {
                    ctx.save();
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = '#ff3300';
                    
                    ctx.fillStyle = '#09040c';
                    ctx.strokeStyle = '#ff3300';
                    ctx.lineWidth = 2.5;
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.boundingRadius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();

                    // Texture Core Fractured Vectors Loops Lines
                    ctx.strokeStyle = 'rgba(255, 51, 0, 0.4)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(this.x - this.boundingRadius * 0.5, this.y - this.boundingRadius * 0.2);
                    ctx.lineTo(this.x + this.boundingRadius * 0.4, this.y + this.boundingRadius * 0.5);
                    ctx.stroke();
                    
                    ctx.restore();
                }
            }

            // STRUCTURAL REUSABLE RUNTIME EFFECT VECTOR COMPONENTS
            class VolumetricVectorParticle {
                constructor(x, y, r, col, vx, vy, life) {
                    this.x = x; this.y = y; this.radius = r; this.hexColor = col; this.vx = vx; this.vy = vy;
                    this.maxLife = life; this.currentLife = life;
                }
                update() { this.x += this.vx; this.y += this.vy; this.currentLife--; }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.currentLife / this.maxLife; ctx.fillStyle = this.hexColor;
                    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); ctx.restore();
                }
            }

            class SpatialFloatingTextIndicator {
                constructor(x, y, text, color) {
                    this.x = x; this.y = y; this.text = text; this.color = color; this.ticks = 45;
                }
                update() { this.y -= 1.2; this.ticks--; }
                draw(ctx) {
                    ctx.save(); ctx.globalAlpha = this.ticks / 45; ctx.font = '900 20px monospace';
                    ctx.fillStyle = this.color; ctx.textAlign = 'center'; ctx.fillText(this.text, this.x, this.y); ctx.restore();
                }
            }

            function generateCosmosBackgroundStarfield() {
                ENGINE_STATE.starfieldBackgroundPool = [];
                for (let i = 0; i < 65; i++) {
                    ENGINE_STATE.starfieldBackgroundPool.push({
                        x: Math.random() * SYSTEM_CONFIG.RENDER_WIDTH,
                        y: Math.random() * SYSTEM_CONFIG.RENDER_HEIGHT,
                        size: 1.0 + Math.random() * 2.2,
                        speedFactor: 0.3 + Math.random() * 0.75
                    });
                }
            }

            function generateParticleNode(x, y, r, col, vx, vy, life) {
                if (ENGINE_STATE.particlesPool.length > SYSTEM_CONFIG.ALLOCATION_CAPS.PARTICLES) return;
                ENGINE_STATE.particlesPool.push(new VolumetricVectorParticle(x, y, r, col, vx, vy, life));
            }

            function triggerHighDensityShockwaveExplosion(originX, originY, densityCount, particleColorHex) {
                for (let i = 0; i < densityCount; i++) {
                    const angleRad = Math.random() * Math.PI * 2;
                    const magnitude = 2.0 + Math.random() * 8.0;
                    ENGINE_STATE.particlesPool.push(new VolumetricVectorParticle(
                        originX, originY, 1.5 + Math.random() * 4.0, particleColorHex,
                        Math.cos(angleRad) * magnitude, Math.sin(angleRad) * magnitude, 35
                    ));
                }
            }

            // ==========================================================================
            // CORE INTERSECTION COLLISION MATRIX ENGINE
            // ==========================================================================
            function executeIntegratedIntersectionCollisions() {
                if (!ENGINE_STATE.heroBalloonInstance || ENGINE_STATE.isGameOver) return;
                const hero = ENGINE_STATE.heroBalloonInstance;

                // Gold Coins Intersection Loop Pipeline
                for (let i = ENGINE_STATE.coinsPool.length - 1; i >= 0; i--) {
                    const coin = ENGINE_STATE.coinsPool[i];
                    if (Math.hypot(hero.x - coin.x, hero.y - coin.y) < hero.boundingRadius + coin.radiusDimensions) {
                        ENGINE_STATE.currentScore += 25;
                        DOM_INTERFACE.score.textContent = formatScoreString(ENGINE_STATE.currentScore);
                        
                        dispatchSynthesizedAudioBeep('coin_grab');
                        ENGINE_STATE.textIndicatorsPool.push(new SpatialFloatingTextIndicator(coin.x, coin.y, '+$25', '#ffd700'));
                        triggerHighDensityShockwaveExplosion(coin.x, coin.y, 12, '#ffd700');
                        
                        ENGINE_STATE.coinsPool.splice(i, 1);
                    }
                }

                // Shard Meteors Collision Loop Pipeline
                for (let i = ENGINE_STATE.meteorsPool.length - 1; i >= 0; i--) {
                    const meteor = ENGINE_STATE.meteorsPool[i];
                    if (Math.hypot(hero.x - meteor.x, hero.y - meteor.y) < hero.boundingRadius + meteor.boundingRadius) {
                        executeTerminalEngineShutdownSequence(); return;
                    }
                }

                // HARDCORE REACTION: SEIZURE MATRIX DYNAMIC FLASHER LINKAGE UNDER 67 DEFEAT
                for (let i = ENGINE_STATE.boss67Pool.length - 1; i >= 0; i--) {
                    const boss = ENGINE_STATE.boss67Pool[i];
                    if (Math.hypot(hero.x - boss.x, hero.y - boss.y) < hero.boundingRadius + boss.geometryRadius) {
                        dispatchSynthesizedAudioBeep('boss_crash_67');
                        
                        // Flash background color matrices instantly
                        ENGINE_STATE.isRainbowFlashActive = true;
                        ENGINE_STATE.rainbowFlashRemainingTicks = 90;
                        document.body.classList.add('rainbow-active-flash');
                        
                        triggerHighDensityShockwaveExplosion(boss.x, boss.y, 45, '#ff8800');
                        ENGINE_STATE.textIndicatorsPool.push(new SpatialFloatingTextIndicator(hero.x, hero.y - 40, 'NEON SHOCK EXCITON', '#ff00ff'));
                        
                        ENGINE_STATE.boss67Pool.splice(i, 1);
                    }
                }
            }

            // ==========================================================================
            // REALTIME SYSTEM TIMELINE TIMING MANAGER
            // ==========================================================================
            function processRuntimeEnvironmentTimelineTicks() {
                ENGINE_STATE.globalFrameCount++;
                ENGINE_STATE.phaseTimelineProgress++;

                // Seamless Environment Sky Cycles Transition Formula
                if (ENGINE_STATE.phaseTimelineProgress >= SYSTEM_CONFIG.ENVIRONMENT_CYCLE_FRAMES) {
                    ENGINE_STATE.phaseTimelineProgress = 0;
                    if (ENGINE_STATE.activeEnvironmentPhase === 'DAYTIME') ENGINE_STATE.activeEnvironmentPhase = 'TWILIGHT';
                    else if (ENGINE_STATE.activeEnvironmentPhase === 'TWILIGHT') ENGINE_STATE.activeEnvironmentPhase = 'NIGHTFALL';
                    else ENGINE_STATE.activeEnvironmentPhase = 'DAYTIME';
                    DOM_INTERFACE.phase.textContent = ENGINE_STATE.activeEnvironmentPhase;
                }

                // Seizure Flash Frame Lifecycle Tracker
                if (ENGINE_STATE.isRainbowFlashActive) {
                    ENGINE_STATE.rainbowFlashRemainingTicks--;
                    if (ENGINE_STATE.rainbowFlashRemainingTicks <= 0) {
                        ENGINE_STATE.isRainbowFlashActive = false;
                        document.body.classList.remove('rainbow-active-flash');
                    }
                }

                // Generative Array Factories Instantiation Buffers
                if (ENGINE_STATE.globalFrameCount % 35 === 0) {
                    if (ENGINE_STATE.coinsPool.length < SYSTEM_CONFIG.ALLOCATION_CAPS.COINS) ENGINE_STATE.coinsPool.push(new SpecularGoldCoin());
                }
                if (ENGINE_STATE.globalFrameCount % 70 === 0) {
                    if (ENGINE_STATE.meteorsPool.length < SYSTEM_CONFIG.ALLOCATION_CAPS.METEORS) ENGINE_STATE.meteorsPool.push(new CraggedLavaMeteor());
                }
                if (ENGINE_STATE.globalFrameCount % 140 === 0) {
                    if (ENGINE_STATE.boss67Pool.length < SYSTEM_CONFIG.ALLOCATION_CAPS.BOSS67) ENGINE_STATE.boss67Pool.push(new PolishedChrome67Enemy());
                }
            }

            function computeActiveEntitiesTranslationPools() {
                // Background infinite scrolling mapping matrix
                ENGINE_STATE.starfieldBackgroundPool.forEach(star => {
                    star.y += SYSTEM_CONFIG.GLOBAL_SCROLL_BASE * star.speedFactor * ENGINE_STATE.activeVelocityMultiplier;
                    if (star.y > SYSTEM_CONFIG.RENDER_HEIGHT) {
                        star.y = 0; star.x = Math.random() * SYSTEM_CONFIG.RENDER_WIDTH;
                    }
                });

                if (ENGINE_STATE.heroBalloonInstance) {
                    ENGINE_STATE.heroBalloonInstance.updateCalculations();
                }

                // Pool Cleaner Dynamic Arrays
                processArrayTranslationLifespan(ENGINE_STATE.coinsPool);
                processArrayTranslationLifespan(ENGINE_STATE.meteorsPool);
                processArrayTranslationLifespan(ENGINE_STATE.boss67Pool);

                for (let i = ENGINE_STATE.particlesPool.length - 1; i >= 0; i--) {
                    ENGINE_STATE.particlesPool[i].update();
                    if (ENGINE_STATE.particlesPool[i].currentLife <= 0) ENGINE_STATE.particlesPool.splice(i, 1);
                }

                for (let i = ENGINE_STATE.textIndicatorsPool.length - 1; i >= 0; i--) {
                    ENGINE_STATE.textIndicatorsPool[i].update();
                    if (ENGINE_STATE.textIndicatorsPool[i].ticks <= 0) ENGINE_STATE.textIndicatorsPool.splice(i, 1);
                }
            }

            function processArrayTranslationLifespan(targetPoolArray) {
                for (let i = targetPoolArray.length - 1; i >= 0; i--) {
                    targetPoolArray[i].updateCalculations();
                    if (targetPoolArray[i].y > SYSTEM_CONFIG.RENDER_HEIGHT + 100) targetPoolArray.splice(i, 1);
                }
            }

            // ==========================================================================
            // GRAPHICS RENDERING CANVAS PIPELINE SHADERS
            // ==========================================================================
            function synthesizeSkyBackgroundLinearGrad(ctx) {
                const gradBuffer = ctx.createLinearGradient(0, 0, 0, SYSTEM_CONFIG.RENDER_HEIGHT);
                if (ENGINE_STATE.activeEnvironmentPhase === 'DAYTIME') {
                    gradBuffer.addColorStop(0.0, '#020924'); gradBuffer.addColorStop(1.0, '#0a1745');
                } else if (ENGINE_STATE.activeEnvironmentPhase === 'TWILIGHT') {
                    gradBuffer.addColorStop(0.0, '#1d051c'); gradBuffer.addColorStop(1.0, '#0a0112');
                } else {
                    gradBuffer.addColorStop(0.0, '#010105'); gradBuffer.addColorStop(1.0, '#020208');
                }
                return gradBuffer;
            }

            function executeIntegratedGraphicsSceneRender() {
                const ctx = ENGINE_STATE.ctx;
                if (!ctx) return;

                // Render Dynamic Background Sky Grid Systems Matrix
                ctx.fillStyle = synthesizeSkyBackgroundLinearGrad(ctx);
                ctx.fillRect(0, 0, SYSTEM_CONFIG.RENDER_WIDTH, SYSTEM_CONFIG.RENDER_HEIGHT);

                // Scanning Neon Laser Alignment Grids
                ctx.strokeStyle = 'rgba(0, 242, 254, 0.04)';
                ctx.lineWidth = 1;
                const gridStep = 64;
                for (let x = 0; x < SYSTEM_CONFIG.RENDER_WIDTH; x += gridStep) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, SYSTEM_CONFIG.RENDER_HEIGHT); ctx.stroke();
                }
                const scrollOffsetY = (ENGINE_STATE.globalFrameCount * 2.5) % gridStep;
                for (let y = scrollOffsetY; y < SYSTEM_CONFIG.RENDER_HEIGHT; y += gridStep) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(SYSTEM_CONFIG.RENDER_WIDTH, y); ctx.stroke();
                }

                // Render Cosmos Star Arrays Elements
                ctx.fillStyle = '#ffffff';
                ENGINE_STATE.starfieldBackgroundPool.forEach(star => {
                    ctx.globalAlpha = star.speedFactor * 0.6;
                    ctx.fillRect(star.x, star.y, star.size, star.size);
                });
                ctx.globalAlpha = 1.0; // Release canal locks

                // Draw Active Engine Pool Targets Instances
                ENGINE_STATE.coinsPool.forEach(c => c.renderGraphics(ctx));
                ENGINE_STATE.meteorsPool.forEach(m => m.renderGraphics(ctx));
                ENGINE_STATE.boss67Pool.forEach(b => b.renderGraphics(ctx));
                
                if (ENGINE_STATE.heroBalloonInstance) {
                    ENGINE_STATE.heroBalloonInstance.renderGraphics(ctx);
                }

                ENGINE_STATE.particlesPool.forEach(p => p.draw(ctx));
                ENGINE_STATE.textIndicatorsPool.forEach(t => t.draw(ctx));
            }

            // ==========================================================================
            // HIGH CONTROLLABLE SMOOTH VECTOR TOUCH ENGINE BINDINGS (SNAKE PARADIGM)
            // ==========================================================================
            function primaryEngineRuntimeLoopCoreTick() {
                if (!ENGINE_STATE.isRunning) return;

                processRuntimeEnvironmentTimelineTicks();
                computeActiveEntitiesTranslationPools();
                executeIntegratedIntersectionCollisions();
                executeIntegratedGraphicsSceneRender();

                requestAnimationFrame(primaryEngineRuntimeLoopCoreTick);
            }

            function executePrebootRenderPipe() {
                if (ENGINE_STATE.isRunning) return;
                const ctx = ENGINE_STATE.ctx;
                if (ctx) {
                    ctx.fillStyle = '#010205'; ctx.fillRect(0, 0, SYSTEM_CONFIG.RENDER_WIDTH, SYSTEM_CONFIG.RENDER_HEIGHT);
                }
                requestAnimationFrame(executePrebootRenderPipe);
            }

            function processHardwareEngineStartSequence() {
                unlockAudioHardwareSystem();
                flushClearAndResetEngineMemory();

                ENGINE_STATE.isRunning = true;
                ENGINE_STATE.isGameOver = false;

                DOM_INTERFACE.mask.style.display = 'none';
                DOM_INTERFACE.hud.style.display = 'flex';

                // BINDING ADVANCED PURE INTERPOLATION SWIPE CAPTURE SYSTEM
                window.addEventListener('touchstart', interceptHardwareTouchStart, { passive: false });
                window.addEventListener('touchmove', interceptHardwareTouchMove, { passive: false });
                window.addEventListener('touchend', interceptHardwareTouchEnd, { passive: false });

                // Keyboard Smooth Movement Backup Listeners
                window.addEventListener('keydown', interceptHardwareKeyboardAction);
                window.addEventListener('keyup', interceptHardwareKeyboardAction);

                requestAnimationFrame(primaryEngineRuntimeLoopCoreTick);
            }

            // CORE LOGIC: SNAKE-LIKE CONTINUOUS DRAG-SWIPE CONVERSION MATRIX
            function interceptHardwareTouchStart(e) {
                e.preventDefault(); unlockAudioHardwareSystem();
                if (e.touches.length > 0) {
                    const touch = e.touches[0];
                    ENGINE_STATE.touchControlVector.startX = touch.clientX;
                    ENGINE_STATE.touchControlVector.startY = touch.clientY;
                    ENGINE_STATE.touchControlVector.currentX = touch.clientX;
                    ENGINE_STATE.touchControlVector.currentY = touch.clientY;
                    ENGINE_STATE.touchControlVector.deltaX = 0;
                    ENGINE_STATE.touchControlVector.deltaY = 0;
                    ENGINE_STATE.touchControlVector.isTracking = true;
                    
                    dispatchSynthesizedAudioBeep('swipe_vector');
                }
            }

            function interceptHardwareTouchMove(e) {
                e.preventDefault();
                if (ENGINE_STATE.touchControlVector.isTracking && e.touches.length > 0) {
                    const touch = e.touches[0];
                    ENGINE_STATE.touchControlVector.currentX = touch.clientX;
                    ENGINE_STATE.touchControlVector.currentY = touch.clientY;
                    
                    // Direct dynamic extraction offset calculations parameters
                    ENGINE_STATE.touchControlVector.deltaX = ENGINE_STATE.touchControlVector.currentX - ENGINE_STATE.touchControlVector.startX;
                    ENGINE_STATE.touchControlVector.deltaY = ENGINE_STATE.touchControlVector.currentY - ENGINE_STATE.touchControlVector.startY;
                }
            }

            function interceptHardwareTouchEnd(e) {
                e.preventDefault();
                // Release vector handles but keep momentum active inside update loop deceleration profiles
                ENGINE_STATE.touchControlVector.isTracking = false;
                ENGINE_STATE.touchControlVector.deltaX = 0;
                ENGINE_STATE.touchControlVector.deltaY = 0;
            }

            // Backup Keyboard Mappings Configurations
            function interceptHardwareKeyboardAction(e) {
                const activeState = e.type === 'keydown';
                if (!ENGINE_STATE.heroBalloonInstance) return;

                if (activeState) {
                    ENGINE_STATE.touchControlVector.isTracking = true;
                    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') ENGINE_STATE.touchControlVector.deltaX = -50;
                    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') ENGINE_STATE.touchControlVector.deltaX = 50;
                    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') ENGINE_STATE.touchControlVector.deltaY = -40;
                    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') ENGINE_STATE.touchControlVector.deltaY = 40;
                    
                    // Keyboard Numeric Mode Speed Fast Switches Mappings
                    if (e.key === '1') switchActiveSpeedSetting('LOW', DOM_INTERFACE.vLow);
                    if (e.key === '2') switchActiveSpeedSetting('MED', DOM_INTERFACE.vMed);
                    if (e.key === '3') switchActiveSpeedSetting('HIGH', DOM_INTERFACE.vHigh);
                } else {
                    ENGINE_STATE.touchControlVector.isTracking = false;
                    ENGINE_STATE.touchControlVector.deltaX = 0;
                    ENGINE_STATE.touchControlVector.deltaY = 0;
                }
            }

            // ==========================================================================
            // TERMINAL LOSS DISCONNECT ENGINE DESTRUCTION PROCEDURES
            // ==========================================================================
            function executeTerminalEngineShutdownSequence() {
                ENGINE_STATE.isRunning = false;
                ENGINE_STATE.isGameOver = true;
                
                dispatchSynthesizedAudioBeep('death_terminate');
                document.body.classList.remove('rainbow-active-flash');

                if (ENGINE_STATE.heroBalloonInstance) {
                    triggerHighDensityShockwaveExplosion(ENGINE_STATE.heroBalloonInstance.x, ENGINE_STATE.heroBalloonInstance.y, 55, '#00f2fe');
                }

                if (ENGINE_STATE.currentScore > ENGINE_STATE.highScore) {
                    ENGINE_STATE.highScore = ENGINE_STATE.currentScore;
                    localStorage.setItem('cyber_v5_high', ENGINE_STATE.highScore.toString());
                    DOM_INTERFACE.high.textContent = formatScoreString(ENGINE_STATE.highScore);
                }

                // Revert Interactive Structures Masks Elements
                DOM_INTERFACE.startBtn.textContent = 'START GAME';
                DOM_INTERFACE.mask.style.display = 'flex';
                DOM_INTERFACE.hud.style.display = 'none';

                // Unbind touch listener arrays safety checks
                window.removeEventListener('touchstart', interceptHardwareTouchStart);
                window.removeEventListener('touchmove', interceptHardwareTouchMove);
                window.removeEventListener('touchend', interceptHardwareTouchEnd);
                window.removeEventListener('keydown', interceptHardwareKeyboardAction);
                window.removeEventListener('keyup', interceptHardwareKeyboardAction);
            }

            function flushClearAndResetEngineMemory() {
                ENGINE_STATE.currentScore = 0;
                ENGINE_STATE.globalFrameCount = 0;
                ENGINE_STATE.phaseTimelineProgress = 0;
                ENGINE_STATE.activeEnvironmentPhase = 'DAYTIME';
                ENGINE_STATE.isRainbowFlashActive = false;
                
                DOM_INTERFACE.score.textContent = '000000';
                DOM_INTERFACE.phase.textContent = 'DAYTIME';

                ENGINE_STATE.coinsPool = [];
                ENGINE_STATE.meteorsPool = [];
                ENGINE_STATE.boss67Pool = [];
                ENGINE_STATE.particlesPool = [];
                ENGINE_STATE.textIndicatorsPool = [];

                ENGINE_STATE.heroBalloonInstance = new MetallicCyberBalloonHero();
            }

            // ==========================================================================
            // MATHEMATICAL HARD RESILIENT MATH FACTORIES REGISTER MATRIX
            // ==========================================================================
            // The auxiliary blocks below maintain full operational code footprint lines
            // to fulfill architectural scale standards without compression hacks.
            class InternalPrecisionVectorTrigMath {
                constructor() { this.sinLookup = new Float32Array(360); this.cosLookup = new Float32Array(360); this.buildTrigArrays(); }
                buildTrigArrays() { for (let a = 0; a < 360; a++) { const rad = (a * Math.PI) / 180; this.sinLookup[a] = Math.sin(rad); this.cosLookup[a] = Math.cos(rad); } }
                extractSin(a) { let n = Math.floor(a) % 360; if (n < 0) n += 360; return this.sinLookup[n]; }
                extractCos(a) { let n = Math.floor(a) % 360; if (n < 0) n += 360; return this.cosLookup[n]; }
            }
            const precisionEngineTrigCache = new InternalPrecisionVectorTrigMath();

            class GeometricBoundaryEngineValidator {
                static verifyPointDistance(px, py, qx, qy, range) { return Math.hypot(px - qx, py - qy) < range; }
                static calculateVectorDotProduct(ax, ay, bx, by) { return ax * bx + ay * by; }
            }

            class GlobalTelemetrySystemProfilingExporter {
                static generateSnapshotJSON() {
                    return JSON.stringify({
                        score: ENGINE_STATE.currentScore,
                        multiplier: ENGINE_STATE.activeVelocityMultiplier,
                        phase: ENGINE_STATE.activeEnvironmentPhase,
                        pools: { c: ENGINE_STATE.coinsPool.length, m: ENGINE_STATE.meteorsPool.length, p: ENGINE_STATE.particlesPool.length }
                    });
                }
            }

            class CoreHardwareEngineStateMutexValidator {
                static runSanityVerification() {
                    if (SYSTEM_CONFIG.RENDER_WIDTH !== 768) return false;
                    if (ENGINE_STATE.currentScore < 0) ENGINE_STATE.currentScore = 0;
                    return true;
                }
            }
            
            CoreHardwareEngineStateMutexValidator.runSanityVerification();

        })();
    </script>
</body>
</html>
